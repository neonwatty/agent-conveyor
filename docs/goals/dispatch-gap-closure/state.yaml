# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Dispatch Gap Closure"
  slug: "dispatch-gap-closure"
  kind: audit
  tranche: "Close the post-rollout dispatch gaps from issues #127, #128, #129 and the named rough edges found by the code and issue audits."
  status: done
  oracle:
    signal: "Focused tests, docs, issue receipts, and final source-backed audit prove every named gap is fixed or deliberately deferred with a concrete follow-up artifact."
    cadence: "after each Worker package and at final audit"
    final_proof: "A final Judge/PM receipt maps #127/#128/#129 and each named rough edge to passing tests, changed files, docs, or explicit follow-up issues; full verification is green; full_outcome_complete is true."
  intake:
    original_request: "make a detailed plan using $goalbuddy:goal-prep based on your gap findings"
    interpreted_outcome: "Prepare a GoalBuddy execution board that turns the dispatch gap audit into safe, parallelizable implementation work."
    input_shape: audit
    audience: "workerctl operators, manager/worker pair users, and future GoalBuddy-driven supervision runs"
    authority: requested
    proof_type: test
    completion_proof: "Issues #127, #128, and #129 are fixed or superseded, rough edges are implemented or tracked, verification passes, and a final audit ties evidence to every gap finding."
    likely_misfire: "Treating the old dispatch issue closure as sufficient while the dogfood follow-ups and operator-facing rough edges remain open."
    blind_spots_considered:
      - "Dispatch could accidentally become a decision maker instead of a mechanical router."
      - "Telemetry failure scoping might hide important historical failures or overfit to one dogfood workflow."
      - "Pane classifier fixes could suppress genuine approval prompts."
      - "Acceptance criteria seeding could duplicate or overwrite user-authored ledger entries."
      - "Unbounded dispatch watch mode could keep long-running shells alive during verification."
      - "Continuation-review hard isolation may be larger than a safe local tranche."
      - "Dashboard correlation grouping may belong in a separate UI workstream if the current app surface is not ready."
    existing_plan_facts:
      - "Core dispatch-related issues #113, #114, #115, #116, #117, and #122 are closed."
      - "Related PRs #118, #119, #121, #123, #124, #125, and #126 were merged."
      - "Open dogfood follow-up issues are #127, #128, and #129."
      - "#127: telemetry failures view needs recency or active-task scoping for operator triage."
      - "#128: pane classifier can falsely report approval_prompt from historical transcript text."
      - "#129: pair should seed acceptance criteria ledger from manager acceptance config."
      - "Additional code-audit rough edges: public dispatch --watch lacks a bounded iteration flag; command lease duration is not CLI tunable; command_enqueue_notify_manager returns a duplicate command_type key; workerctl commands does not show attempt history directly; continuation-review evidence is stored as an events row rather than structured telemetry; continuation-review isolation is by convention/context/metadata rather than hard sandbox; README says dashboard grouping by correlation chains is still a follow-up."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/dispatch-gap-closure/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/dispatch-gap-closure"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Reconcile the dispatch gap findings against current repo state and issues #127, #128, and #129 before any implementation."
    inputs:
      - "GitHub issues #127, #128, and #129"
      - "Previous issue audit finding: #113/#114/#115/#116/#117/#122 closed"
      - "Previous code audit rough edges listed in goal.intake.existing_plan_facts"
      - "workerctl CLI, command queue, pane classifier, telemetry, acceptance ledger, continuation review, replay/audit/dashboard surfaces"
      - "tests/test_workerctl.py and any existing targeted test files"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Prefer exact file/function/test evidence."
      - "Do not reopen already-closed dispatch work unless evidence shows the acceptance criteria are actually missing."
    expected_output:
      - "Gap matrix: issue or rough edge, current behavior, missing behavior, likely files, existing tests, proposed verification."
      - "Parallelization map with disjoint write scopes and dependencies."
      - "Risk notes for classifier precision, acceptance-ledger idempotency, dispatch no-judgment boundary, and continuation-review isolation."
      - "Candidate first Worker packages with allowed_files and verify commands."
    receipt:
      result: done
      note: "notes/T001-scout-map.md"
      summary: "Reconciled current repo state and live issues #127, #128, and #129. All three issues remain open with evidenced gaps; bounded dispatch watch is partially implemented internally but not public; correlation chains exist but grouping remains incomplete."
      evidence:
        - "#127 open: telemetry failures need recency, task, run, active-only, or equivalent scoping."
        - "#128 open: classifier can falsely report approval_prompt from historical transcript text."
        - "#129 open: pair stores manager acceptance config but does not seed acceptance_criteria ledger rows."
        - "workerctl/classify.py scans full output for broad approval substrings."
        - "workerctl/supervise_cycle.py criteria negotiation reads active acceptance_criteria rows."
        - "workerctl/db.py has acceptance_criteria unique task/source/criterion index."
        - "workerctl/commands.py supports internal watch_iterations, while workerctl/cli.py exposes --watch/--interval only."
        - "workerctl/db.py has correlation_chains; dashboard/replay grouping still needs scoped follow-up."
      contradictions:
        - "T004 allowed_files referenced missing workerctl/panes.py; classifier surfaces are workerctl/classify.py and workerctl/shadow_state.py."
        - "Duplicate notify-manager result key was not reproduced in the inspected output path."
