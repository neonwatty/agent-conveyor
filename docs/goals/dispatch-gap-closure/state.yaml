      - "Reject completion unless all named gaps are represented by Worker tasks, explicit deferrals, or issue-hygiene tasks."
    expected_output:
      - "approved | revise"
      - "Ordered Worker/Scout/Judge task activation plan."
      - "Parallel lanes and disjoint write scopes."
      - "First Worker objective, allowed_files, verify commands, and stop_if conditions."
      - "Risks that require Judge review before implementation."
    receipt:
      result: done
      note: "notes/T002-judge-selection.md"
      decision: "approved"
      full_outcome_complete: false
      summary: "Approved T003 as the first Worker slice. Do not parallelize queued Worker tasks as-is because their write scopes overlap; narrow T004 before parallel classifier work."
      ordered_activation_plan:
