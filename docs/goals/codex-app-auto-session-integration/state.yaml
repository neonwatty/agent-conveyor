# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Codex App Auto Session Integration"
  slug: "codex-app-auto-session-integration"
  kind: specific
  tranche: "Implement and prove app-assisted fresh Codex worker thread setup while preserving terminal/tmux and Dispatch inbox behavior."
  status: done
  oracle:
    signal: "A Codex app manager can create a fresh same-project worker thread, name it, record or surface its app-thread identity in Conveyor setup, and route work through pull-required Dispatch inboxes; terminal/tmux setup remains unchanged."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM receipt cites focused tests, diff check, skill/docs inspection, and a live no-edit Codex app thread creation/list/read receipt with title, thread id, cwd, and status."
  intake:
    original_request: "Work this up as a GoalBuddy prep board, sequence of tasks with measurable acceptance criteria, and implement."
    interpreted_outcome: "Agent Conveyor gains a practical app-assisted setup path that creates fresh Codex app worker sessions when invoked from a Codex app manager, while terminal users still get tmux setup and app sessions still communicate via Dispatch inboxes."
    input_shape: specific
    audience: "Agent Conveyor users, Codex app manager sessions, Codex app worker sessions, maintainers dogfooding manager/dispatcher/worker loops"
    authority: approved
    proof_type: "test + live demo + audit"
    completion_proof: "A verified implementation plus live no-edit app-thread proof demonstrates fresh Codex app worker creation, title/list accessibility, Conveyor metadata/workflow integration, and pull-required Dispatch communication."
    likely_misfire: "Shipping docs around forked sessions or app-only behavior while failing fresh `create_thread`, breaking tmux pair creation, or bypassing Dispatch inbox audit."
    blind_spots_considered:
      - "Codex app thread tools are app-layer capabilities, not guaranteed terminal CLI capabilities."
      - "Fresh `create_thread` and same-directory `fork_thread` are different and must not be conflated."
      - "Direct app-thread messages should not replace `routed_notifications` as durable communication truth."
      - "Operators need human-readable titles and thread ids to confirm the intended worker."
      - "Fallback behavior must remain useful when app thread tools are unavailable."
    existing_plan_facts:
      - "Same-directory `fork_thread` created thread `019ead56-bc10-7ff0-8043-811e9a1d044a` titled `this is a test`, but that was a fork."
      - "Fresh `create_thread` created thread `019ead57-6769-7b62-b793-aeeb318c3ae1` in `/Users/neonwatty/Desktop/codex-terminal-manager`, titled `this is a created test`, and `list_threads` showed it idle and accessible."
      - "Existing no-tmux Dispatch flow uses `delivery_mode='pull_required'` and `manager-inbox`/`worker-inbox` polling."
      - "The package currently has tmux `pair` and no-tmux `create-disposable-binding`, but no first-class app-thread creation integration."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

