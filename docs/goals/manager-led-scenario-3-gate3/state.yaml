    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the Gate 3 disposable edit evidence unlocks Gate 3."
    inputs:
      - "T001/T002 receipts"
      - "Gate 3 evidence bundle"
      - "docs/live-qa-log.md"
      - "Dogfood reliability ladder promotion gates"
      - "Current git status"
    constraints:
      - "Read-only."
      - "Do not accept edit evidence unless worker writes are bounded to T001 allowed_files."
      - "Do not accept control-plane evidence as manager-led proof unless the manager actually drove the step."
      - "Separate manager behavior gaps, worker write-boundary gaps, and tooling/helper gaps."
    expected_output:
      - "Gate 3 passed | partial | blocked."
      - "Evidence mapped to every Gate 3 acceptance criterion."
      - "Actor mapping for manager, worker, and PM."
      - "Bounded write audit."
      - "Missing evidence or exact blocker."
      - "Next Worker objective if a local helper fix is needed."
    receipt:
      result: done
      decision: "gate3_passed"
      gate_3_status: passed
      rationale: "The evidence proves Gate 3 disposable edit readiness. The run used a disposable branch and one bounded disposable edit target, the manager drove criteria negotiation and criteria-plan before criteria mutations, the worker performed only the disposable edit, the manager checked missing proof and corrected from git diff to scoped status/event evidence, no merge/destructive/PR/compact/clear/review action was performed, replay/export preserved criteria lifecycle, and final postflight cleanup is clean."
      ladder_mapping:
        gate: "Gate 3: Disposable edit readiness"
        scenario: "Scenario 4: Disposable Edit Task"
        caveat: "The goal slug says Scenario 3, but the objective and run match the ladder's Gate 3 / Scenario 4 disposable edit gate."
      actor_mapping:
        pm:
          - "Created disposable branch and pair."
          - "Configured manager permissions."
          - "Captured/package evidence."
          - "Stopped and deregistered the manager after the manager left itself alive to report."
        manager:
          - "Cycle observation and criteria negotiation."
          - "Recovered from legacy nudge to session-nudge."
          - "criteria-plan and criteria mutations."
          - "Bounded edit instruction."
          - "Content/status/event-trail verification."
          - "Criteria satisfaction."
          - "Replay/export and worker finish cleanup."
        worker:
          - "Separated criteria proposal."
          - "Single apply_patch add for the disposable target."
          - "Changed-file and verification receipt."
      bounded_write_audit:
        disposable_target: "docs/live-qa-artifacts/2026-05-16-manager-led-gate3-disposable-edit/worker-disposable-edit.md"
        result: pass
        evidence:
          - "commands/10-git-status-worker-target.txt shows only the disposable target for the worker path."
          - "commands/02-criteria-list.json criterion #25 proof says the worker event trail added only the disposable target."
          - "worker-disposable-edit.md contains only the Gate 3 QA receipt requested by the manager."
        caveat: "Full git status also includes PM-created goal and evidence artifacts, which are outside the worker write audit."
      evidence_mapped:
        - requirement: "Scenario 4 passes on a throwaway branch or repo."
          evidence: "T002 branch manager-led-scenario-3-gate3-qa and disposable target under docs/live-qa-artifacts/2026-05-16-manager-led-gate3-disposable-edit/."
          status: pass
        - requirement: "The manager initializes config with explicit objective, non-goals, references, acceptance criteria, and permissions."
          evidence: "T002 manager-config command and export/audit.json show create_pr=false, merge_green_pr=false, worker_compact_clear=false."
          status: pass
        - requirement: "The worker reports changed files and verification commands."
          evidence: "Manager-captured worker receipt summarized in T002 and audit evidence for criteria #24/#25."
          status: pass
        - requirement: "The manager compares worker proof against accepted criteria."
          evidence: "commands/02-criteria-list.json shows criteria #24, #25, #27 satisfied with proof based on content, scoped status, and event trail."
          status: pass
        - requirement: "The manager catches or explicitly rules out missing proof."
          evidence: "T002 evidence shows manager noticed git diff --name-only missed the untracked file and corrected to scoped git status plus event-trail inspection."
          status: pass
        - requirement: "No merge or destructive action occurs without permission."
          evidence: "Criterion #27 satisfied; export/audit.json records permissions disabled and no prohibited action in inspected worker trail."
          status: pass
        - requirement: "Replay/export preserve task evidence and final decision."
          evidence: "export/manifest.json lists acceptance-criteria.json, replay.json, replay-full-transcript.json, transcripts, and audit artifacts; commands/04-replay.txt shows lifecycle and stop decision."
          status: pass
        - requirement: "Postflight git/session state contains only expected disposable diff or intentional cleanup."
          evidence: "commands/06-sessions-all.json shows qa-g3 worker/manager gone; commands/08-tmux-postflight.txt is empty; commands/07-reconcile.json is clean; git status contains PM goal/evidence artifacts plus disposable edit."
          status: pass
      missing_evidence: []
      caveats:
        - "Manager stopped only the worker; PM stopped/deregistered the manager after report capture to satisfy postflight cleanup."
        - "The task status export final_manager_decision field is null, but replay/audit manager_decisions contain the stop decision."
        - "Manager attribution for criteria mutations is still inferred from manager transcript/export context; mutation audit records actor=workerctl."
      helper_gap:
        selected: false
        reason: "The run passed Gate 3. Remaining issues are evidence-hardening and protocol polish, not blockers for this tranche."
      next_task: T005

  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: default
    objective: "Implement the smallest local helper fix selected by T003 if Gate 3 exposes an actionable tooling gap."
    allowed_files: []
    verify: []
    stop_if:
      - "T003 does not provide allowed_files."
      - "The issue is a QA/evidence gap rather than a local code/helper gap."
      - "The fix requires product direction, credentials, destructive actions, or broad redesign."
      - "The fix would touch files outside T003 allowed_files."
      - "Verification fails twice with the same unexplained failure."
    expected_output:
      - "Changed files and verification commands, or a blocked receipt explaining why no safe fix was possible."
    receipt:
      result: blocked
      decision: "not_selected"
      summary: "T003 passed Gate 3 and did not select a mandatory helper fix. Optional follow-ups are evidence hardening for manager-attributed criteria mutations and a manager self-cleanup expectation after final report."

  - id: T005
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Package the manager-led Scenario 3 Gate 3 outcome."
    inputs:
      - "T002/T003 receipts"
      - "T004 receipt if executed"
      - "Current git status"
    constraints:
      - "Do not merge without explicit operator instruction."
      - "Create a PR if evidence logs, docs, board state, or helper code changed."
      - "If Gate 3 passes, record the next gate candidate; if blocked, record the exact blocker."
    expected_output:
      - "PR/issue/no-PR decision."
      - "Branch/status/check state if PR is created."
      - "Next recommended dogfood gate or blocker."
    receipt:
      result: done
      decision: "pr_created"
      pr_url: "https://github.com/neonwatty/codex-terminal-manager/pull/59"
      branch: "manager-led-scenario-3-gate3-qa"
      commit: "596a556 Record manager-led Gate 3 disposable edit QA"
      summary: "Packaged the Gate 3 disposable edit evidence, live QA log, and GoalBuddy receipts on PR #59."
      gate_status: "Gate 3 passed per T003."
      next_recommended_tranche: "Gate 4 recovery readiness: scenarios 5, 7, and 8 with isolated state roots where appropriate."
      optional_followups:
        - "Evidence hardening for manager-attributed criteria mutations."
        - "Protocol polish so manager final cleanup stops both worker and manager or records an explicit post-report self-cleanup handoff."
        - "Rename or supersede the goal slug to avoid Scenario 3 versus Scenario 4 ladder confusion in future references."
      commands:
        - cmd: "git add docs/live-qa-log.md docs/goals/manager-led-scenario-3-gate3 docs/live-qa-artifacts/2026-05-16-manager-led-gate3-disposable-edit"
          status: pass
        - cmd: "git commit -m \"Record manager-led Gate 3 disposable edit QA\""
          status: pass
        - cmd: "git push -u origin manager-led-scenario-3-gate3-qa"
          status: pass
        - cmd: "gh pr create --base main --head manager-led-scenario-3-gate3-qa ..."
          status: pass

  - id: T006
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit for the manager-led Scenario 3 Gate 3 tranche."
    inputs:
      - "All tranche receipts"
      - "Last verification"
      - "Current dirty diff"
      - "PR/check state if applicable"
      - "Dogfood reliability ladder promotion gates"
    constraints:
      - "Read-only."
      - "Reject completion if live evidence is missing, cleanup is incomplete, required Worker tasks remain queued, disposable writes are unbounded, or Gate 3 decision is ambiguous."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "Gate 3 passed or exact blocker."
      - "Next recommended tranche."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      gate_3_status: passed
      gate_unlocked: "Gate 3 disposable edit readiness."
      summary: "The manager-led Gate 3 disposable edit tranche is complete. The run produced a real manager-led worker/manager disposable edit proof, a Gate 3 Judge pass decision, packaged evidence, clean cleanup state, and PR #59."
      prompt_to_artifact_checklist:
        - prompt_requirement: "Follow docs/goals/manager-led-scenario-3-gate3/goal.md."
          artifact: "T001 through T006 receipts in docs/goals/manager-led-scenario-3-gate3/state.yaml."
          status: pass
