# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Agent Conveyor TypeScript Migration"
  slug: "agent-conveyor-ts-migration"
  kind: existing_plan
  tranche: "Coordinate the overnight TypeScript migration from Python package/CLI to npm package/Node CLI using verified compatibility slices and green PRs."
  status: done
  oracle:
    signal: "Final Judge/PM audit maps Python CLI/package behavior to TypeScript implementation, compatibility shim, or explicit follow-up; local and CI gates are green; npm tarball install smoke proves `conveyor` and `workerctl`; PRs are merged only when green; no automatic npm publish occurred."
    cadence: "after each Worker package, before each PR/merge decision, and at final audit"
    final_proof: "Receipts include contract inventory diff, schema parity evidence, state/DB/tmux/Codex/Dispatch parity tests, package tarball smoke, dashboard build/test, deterministic rc/package gates, CI-green PR links, merge receipts, and final full_outcome_complete true."
  intake:
    original_request: "Convert the Python app to TypeScript, use independent agents for full analysis including QA tests, queue GoalBuddy boards for overnight autonomous execution, PR/CI/merge green PRs, and use npm package name agent-conveyor."
    interpreted_outcome: "Ship a TypeScript/Node Agent Conveyor with npm package path while preserving current CLI, state, QA, dashboard, skill-install, and release confidence contracts."
    input_shape: existing_plan
    audience: "Agent Conveyor users, repo maintainers, local Codex operators, and future npm consumers"
    authority: approved
    proof_type: test
    completion_proof: "The migrated TS implementation/package passes local deterministic gates and CI, installs from an npm tarball with `conveyor` and `workerctl`, preserves or explicitly adjudicates every frozen contract, and merges green PRs without automatic npm publish."
    likely_misfire: "Rewrite code in TS but drop or weaken Python-era CLI flags, output, SQLite behavior, skill assets, package smoke, dashboard integration, or live-smoke cleanup."
    blind_spots_considered:
      - "The npm name can be claimed before publish; re-check before package tasks and before final publish handoff."
      - "npm auth can expire; block only tasks that require auth and continue safe local work."
      - "Current TS config is dashboard-only and noEmit; distributable CLI needs its own build/package boundary."
      - "The Python package remains the installed release path until package smoke is replaced."
      - "Live smoke depends on tmux and Codex availability and can be skipped in hosted CI."
      - "Publishing to npm should remain a human-approved final step."
      - "Unrelated existing dirty files must not be reverted."
    existing_plan_facts:
      - "Independent scouts completed architecture, QA, TS dashboard, and packaging investigations."
      - "Use npm package name `agent-conveyor`."
      - "Local npm CLI auth was verified with `npm whoami` returning `neonwatty`."
      - "`npm view agent-conveyor name version --json` returned E404 during investigation."
      - "Baseline local deterministic gates passed before board creation; see notes/investigation-summary.md."
      - "A single parent board should coordinate child-board-style tranches because the later slices depend on contract-freeze artifacts."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  no_automatic_publish: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

