# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Ralph Loop Dispatch Guardrails"
  slug: "ralph-loop-dispatch-guardrails"
  kind: specific
  tranche: "Implement dispatcher-enforced Ralph-loop continuation policy so invalid manager continue requests never reach workers, then prove it in browser QA."
  status: active
  oracle:
    signal: "Browser QA proves a max_iterations=1 Ralph loop blocks a manager-requested second iteration before worker delivery and exposes the refusal in operator surfaces."
    cadence: "after Scout, after implementation, after browser QA, and at final audit"
    final_proof: "Merged PR with backend tests, dashboard/browser QA evidence, replay/audit evidence, clean review, and final receipt mapping max-iteration block to no worker delivery."
  intake:
    original_request: "Plan this out with GoalBuddy prep including a new browser QA test case with precise acceptance criteria."
    interpreted_outcome: "Dispatch enforces preset Ralph-loop limits so invalid manager continuation requests are blocked before reaching workers, with browser-visible proof."
    input_shape: specific
    audience: "workerctl operators, Ralph-loop managers, Codex workers, Dispatch maintainers, and dashboard QA reviewers"
    authority: requested
    proof_type: "test + demo + review"
    completion_proof: "A browser-backed QA walkthrough plus automated tests prove max-iteration refusal, no worker delivery, manager refusal receipt, and dashboard/replay/audit visibility."
    likely_misfire: "Only documenting manager behavior or adding a dashboard badge while Dispatch still delivers invalid continuation commands."
    blind_spots_considered:
      - "Dispatch must enforce mechanical policy only, not judge task success or PR quality."
      - "The manager needs a refusal receipt; silent drops are not acceptable."
      - "Both tmux push delivery and Codex app worker-inbox delivery must be blocked by the same policy gate."
      - "Browser QA must prove the negative: no worker inbox item and no tmux send for a blocked continuation."
      - "Any future operator override must be explicit and permission-gated, not implicit manager authority."
    existing_plan_facts:
      - "Ralph-loop runs use seed prompts, iterations, correlation ids, manager decisions, PR/CI/merge evidence, handoff, clear/compact policy, and stop conditions."
      - "Dispatch already processes durable commands and routed notifications and records command attempts."
      - "Session inbox supports no-tmux Codex app delivery through manager-inbox and worker-inbox."
      - "Dashboard/replay/audit already expose dispatch chains, inbox delivery, and command attempt evidence."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: starting
    url: "http://goalbuddy.localhost:41737/ralph-loop-dispatch-guardrails/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/ralph-loop-dispatch-guardrails"

active_task: T005

