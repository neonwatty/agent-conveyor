        - "Worker must block before routed_notifications insertion and before tmux send, while preserving existing nudge_worker behavior."
        - "Browser QA must assert continue_iteration, max_iterations_reached, 1/1 or current/max details, 0 notifications, Inbox 0, and Pull inbox 0."
