          status: pass
        - cmd: "scripts/workerctl cycle qa-emergent-criteria-20260516-run2"
          status: pass
        - cmd: "scripts/workerctl criteria-plan qa-emergent-criteria-20260516-run2 --from-worker-response docs/live-qa-artifacts/2026-05-16-emergent-criteria/responses/worker-criteria-response.md --json"
