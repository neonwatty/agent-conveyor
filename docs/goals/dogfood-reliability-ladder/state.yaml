      rationale: "The verified criteria-plan helper resolves the manual prose-to-command blocker identified by the dogfood plan, but no live dogfood promotion gate is unlocked until Scenario 1 and the deterministic/manager-led portions of Scenario 2 are run with evidence."
      promotion_gate_unlocked: null
      exact_blocker: "Gate 1 and Gate 2 still require live worker/manager QA evidence bundles and docs/live-qa-log.md entries."
      evidence:
        - "workerctl/criteria_plan.py implements the read-only parser and command suggestions."
        - "workerctl/cli.py exposes criteria-plan with explicit text/file/stdin inputs."
        - "workerctl/commands.py resolves the task, renders JSON/text suggestions, updates the manager bootstrap prompt, and adds criteria-plan to qa-plan emergent-criteria."
        - "tests/test_workerctl.py covers separated parser output, ambiguous warning output, CLI JSON shape, text output, and non-mutation of acceptance_criteria/events/commands."
        - "python3 -m unittest tests.test_workerctl.CliTests -v passed."
        - "scripts/workerctl qa-plan emergent-criteria | rg 'criteria-plan' passed."
        - "python3 -m unittest discover -s tests -v passed with 334 tests and known SQLite ResourceWarning noise."
      missing_evidence:
        - "No live Scenario 1 status-only pair QA evidence bundle yet."
        - "No live Scenario 2 emergent-criteria manager-led QA evidence bundle yet."
      next_task: T005
  - id: T005
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Prepare the operator decision for starting live Scenario 1/2 QA now that criteria-plan is implemented."
