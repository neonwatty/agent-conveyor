# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Dogfood Reliability Ladder"
  slug: "dogfood-reliability-ladder"
  kind: existing_plan
  tranche: "Run live Scenario 1 status-only pair QA and Scenario 2 emergent-criteria QA with durable evidence."
  status: active
  intake:
    original_request: "Use goalbuddy:goal-prep to drive the dogfood reliability ladder with verifiable acceptance criteria."
    interpreted_outcome: "A GoalBuddy board exists that can safely drive development and QA from the dogfood reliability ladder."
    input_shape: existing_plan
    audience: "Jeremy and future codex-terminal-manager dogfood runs"
    authority: requested
    proof_type: artifact
    completion_proof: "A final Judge or PM audit maps task receipts to the revised dogfood plan and shows the baseline is clean/explicit and the current tranche either unlocked the next gate or identified the exact blocker."
    likely_misfire: "Producing more planning or running isolated commands without proving manager-led nudging, emergent criteria, replay/export evidence, and guardrail behavior."
    blind_spots_considered:
      - "Whether to run live pair QA first or build missing QA helpers first."
      - "Whether the untracked plan should be committed before live QA."
      - "Whether manager behavior needs separate Judge review from deterministic control-plane checks."
    existing_plan_facts:
      - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md defines product thesis, evidence bundles, stop conditions, scenarios, promotion gates, and reliability backlog."
      - "The first useful tranche should preserve that plan and decide whether criteria-plan, qa-run, JSON output support, qa-doctor, or live Scenario 1/2 QA comes first."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/dogfood-reliability-ladder/"
    command: "npx goalbuddy board docs/goals/dogfood-reliability-ladder"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: T009

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: default
    objective: "Normalize the revised dogfood reliability ladder baseline before live QA or helper implementation."
    inputs:
      - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
      - "docs/goals/dogfood-reliability-ladder/goal.md"
      - "docs/goals/dogfood-reliability-ladder/state.yaml"
      - "git status --short --branch"
    constraints:
      - "Do not run live worker/manager sessions."
      - "Do not implement app helpers."
      - "Commit only the revised plan and GoalBuddy control files if the operator has approved committing."
      - "If commit is blocked by unrelated dirty work or missing approval, record the exact blocker and leave git state explicit."
    expected_output:
      - "Baseline decision: committed, intentionally uncommitted, or blocked."
      - "Exact files included or intentionally excluded."
      - "Current git status after normalization."
      - "Next recommended tranche: live Scenario 1/2 QA or missing QA helper."
    receipt:
      result: done
      summary: "Baseline normalization prepared for commit with the revised dogfood plan, GoalBuddy charter/state, and generated local board artifact."
      baseline_decision: "commit"
      files_included:
        - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
        - "docs/goals/dogfood-reliability-ladder/goal.md"
        - "docs/goals/dogfood-reliability-ladder/state.yaml"
        - "docs/goals/dogfood-reliability-ladder/.goalbuddy-board/app.js"
        - "docs/goals/dogfood-reliability-ladder/.goalbuddy-board/goalbuddy-mark.png"
        - "docs/goals/dogfood-reliability-ladder/.goalbuddy-board/index.html"
        - "docs/goals/dogfood-reliability-ladder/.goalbuddy-board/styles.css"
      files_excluded: []
      commands:
        - cmd: "node <goalbuddy-cache>/goalbuddy/0.3.6/skills/goalbuddy/scripts/check-update.mjs --json"
          status: pass
        - cmd: "git status --short --branch"
          status: pass
      next_recommended_tranche: "Judge whether to run live Scenario 1/2 QA next or implement a missing QA helper first."
  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "After baseline normalization, choose the first safe execution task from the dogfood reliability ladder."
    inputs:
      - "T001 receipt"
      - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
      - "docs/live-qa-log.md"
      - "README.md"
      - "scripts/workerctl qa-plan emergent-criteria"
    constraints:
      - "Read-only."
      - "Preserve the existing plan facts rather than rediscovering from scratch."
      - "Separate deterministic control-plane proof from live manager-behavior proof."
      - "Choose the largest safe useful next slice with explicit allowed_files, verify commands, and stop conditions."
    expected_output:
      - "Decision: run live QA next or implement a helper first."
      - "Exact next Worker objective."
      - "allowed_files for the next write-capable task."
      - "verify commands for the next task."
      - "stop_if conditions for the next task."
      - "Promotion gate or blocker that the next task addresses."
    receipt:
      result: done
      decision: "implement_criteria_plan_first"
      rationale: "The dogfood ladder and dedicated helper plan both identify prose-to-criteria conversion as the weakest manual step before live emergent-criteria QA. Implementing a read-only criteria-plan helper is safer than starting live worker/manager sessions immediately because it makes Scenario 2 more mechanically repeatable without mutating task state."
      promotion_gate_or_blocker: "Blocks cleaner Gate 2 emergent criteria readiness; unblocks live Scenario 1/2 QA with lower manual command-construction risk."
      next_worker_objective: "Implement read-only workerctl criteria-plan for explicit worker response text, wire CLI/docs/QA plan, and add focused tests proving suggestions are deterministic and non-mutating."
      allowed_files:
        - "workerctl/criteria_plan.py"
        - "workerctl/commands.py"
        - "workerctl/cli.py"
        - "README.md"
        - "docs/superpowers/plans/2026-05-16-manager-criteria-command-helpers.md"
        - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
        - "tests/test_workerctl.py"
        - "docs/goals/dogfood-reliability-ladder/state.yaml"
      verify:
        - "python3 -m unittest tests.test_workerctl.WorkerCtlCliTests -v"
        - "python3 -m unittest discover -s tests -v"
        - "scripts/workerctl qa-plan emergent-criteria | rg 'criteria-plan'"
      stop_if:
        - "Need to parse arbitrary transcripts instead of explicit text/file/stdin input."
        - "Need to add LLM calls or mutate acceptance criteria from criteria-plan."
        - "Need a database schema change."
        - "Focused tests fail twice with the same unexplained failure."
  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: default
    objective: "Implement read-only workerctl criteria-plan for explicit worker response text, wire CLI/docs/QA plan, and add focused tests proving suggestions are deterministic and non-mutating."
    allowed_files:
      - "workerctl/criteria_plan.py"
      - "workerctl/commands.py"
      - "workerctl/cli.py"
      - "README.md"
      - "docs/superpowers/plans/2026-05-16-manager-criteria-command-helpers.md"
      - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
      - "tests/test_workerctl.py"
      - "docs/goals/dogfood-reliability-ladder/state.yaml"
    verify:
      - "python3 -m unittest tests.test_workerctl.WorkerCtlCliTests -v"
      - "python3 -m unittest discover -s tests -v"
      - "scripts/workerctl qa-plan emergent-criteria | rg 'criteria-plan'"
    stop_if:
      - "Need files outside allowed_files."
      - "Need to parse arbitrary transcripts instead of explicit text/file/stdin input."
      - "Need to add LLM calls or mutate acceptance criteria from criteria-plan."
      - "Need a database schema change."
      - "Verification fails twice."
      - "The task would perform destructive or unattended manager actions."
    receipt:
      result: done
      changed_files:
        - "workerctl/criteria_plan.py"
        - "workerctl/commands.py"
        - "workerctl/cli.py"
        - "README.md"
        - "docs/superpowers/plans/2026-05-16-manager-criteria-command-helpers.md"
        - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md"
        - "tests/test_workerctl.py"
        - "docs/goals/dogfood-reliability-ladder/state.yaml"
      summary: "Added read-only workerctl criteria-plan for explicit worker response text/file/stdin, deterministic JSON/text suggestions, reviewed command rendering, manager/QA/docs references, and tests proving separated headings parse while ambiguous prose warns and no criteria/audit tables mutate."
      commands:
        - cmd: "python3 -m unittest tests.test_workerctl.CliTests -v"
          status: pass
        - cmd: "scripts/workerctl qa-plan emergent-criteria | rg 'criteria-plan'"
          status: pass
        - cmd: "python3 -m unittest discover -s tests -v"
          status: pass
          note: "334 tests passed; known Python ResourceWarning noise for unclosed SQLite connections remains."
        - cmd: "scripts/workerctl criteria-plan --help"
          status: pass
      acceptance_criteria:
        - "criteria-plan returns deterministic suggestions for separated must-have and deferred sections."
        - "Ambiguous input returns warnings and no suggestions."
        - "criteria-plan does not mutate acceptance_criteria, events, or commands."
        - "Suggested commands use worker_proposed and accepted/deferred statuses."
        - "Existing criteria mutation flow remains unchanged."
        - "Focused and full unit tests pass."
  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Audit whether the completed first tranche task unlocks the next dogfood promotion gate or identifies a precise blocker."
    inputs:
      - "T001 receipt"
      - "T002/T003 receipt, whichever executed"
      - "Current git status"
      - "Any evidence bundle or verification output"
    constraints:
