      - "full_outcome_complete: true | false."
      - "Gap-by-gap evidence."
      - "Verification summary."
      - "Missing evidence or next task if not complete."
    receipt:
      result: done
      decision: complete
      full_outcome_complete: true
      summary: "All residual dispatch gaps are now fixed or deliberately accepted as truthful asymmetry. Dispatch remains a mechanical routing and actuation layer: no changes make it decide task success, acceptance criteria, next actions, or human/operator routing."
      gap_evidence:
        - gap: "Duplicate-route suppression lacked a true concurrent multi-dispatcher integration test."
          resolution: "fixed"
          evidence: "tests/test_workerctl.py now includes coordinated real concurrent completion dispatch coverage against the routed_notifications dedupe constraint, plus existing suppressed telemetry coverage."
        - gap: "Notification-only next manager cycle/decision correlation is heuristic and may mis-associate close cycles."
          resolution: "fixed"
          evidence: "workerctl/db.py records consumed_manager_cycle_id/consumed_at on routed_notifications; workerctl/supervise_cycle.py stamps delivered notifications when a manager cycle starts; tests/test_workerctl.py proves a close decoy cycle is not linked."
        - gap: "Suppressed dispatch signal dashboard visibility depends on recent telemetry snapshot limits."
          resolution: "fixed"
          evidence: "dashboard/server/index.ts queries filtered durable dispatch_signal_suppressed telemetry; dashboard/server/workerctl.test.ts verifies health counts durable suppressed events outside snapshot recent events."
        - gap: "finish_command_attempt may update command state and emit telemetry even when no running attempt row was updated."
          resolution: "fixed"
          evidence: "workerctl/db.py now checks the running-attempt update rowcount before mutating command state or emitting telemetry; tests/test_workerctl.py covers double-finish rejection."
        - gap: "dispatch may hold a SQLite write transaction across tmux side effects."
          resolution: "fixed"
          evidence: "workerctl/commands.py now separates claim/finalization writes from tmux send side effects; tests/test_workerctl.py verifies another writer can progress during send and duplicate sends remain prevented."
        - gap: "required_permission is optional/free-form at enqueue time."
          resolution: "fixed_for_provided_permissions"
          evidence: "workerctl/db.py validates provided required_permission values against manager permission actions/aliases; omitted permissions remain allowed for compatibility with existing optional-permission behavior."
        - gap: "Worker completion routing is not represented as command_attempt, creating audit shape asymmetry."
          resolution: "acceptable_asymmetry"
          evidence: "T004 judged commandless routed_notifications/correlation_chains as truthful because worker_task_complete routing is not a command side effect."
        - gap: "Ack gating checks latest ack presence but not payload schema or current manager config/binding revision."
          resolution: "fixed"
          evidence: "workerctl/db.py revisions manager_configs and records manager_config_revision plus binding_id on task acknowledgements; workerctl/supervise_cycle.py rejects stale or wrong-binding required acks; tests/test_workerctl.py proves stale acks fail after config revision changes."
        - gap: "dashboard --task may be parsed but ignored by the observation path."
          resolution: "fixed"
          evidence: "dashboard/server/index.ts uses dashboardTaskName to prefer explicit task options; dashboard/server/workerctl.test.ts covers explicit task override."
        - gap: "heartbeat UI omits dry_run, iteration, and processed_count."
          resolution: "fixed"
          evidence: "dashboard/client/main.tsx renders dispatcher, iteration, processed count, and dry-run/live mode; npm build validates the client."
        - gap: "Generic manual QA docs do not include dispatch checks."
          resolution: "fixed"
          evidence: "docs/manual-qa-checklist.md now includes dispatch completion, audit/correlation, and dashboard checks."
      verification:
        - cmd: "python3 -m unittest tests.test_workerctl.DispatchTests tests.test_workerctl.DatabaseTests tests.test_workerctl.SuperviseCycleTests tests.test_workerctl.CliTests -v"
          status: pass
          summary: "186 Python dispatch, database, supervise-cycle, and CLI tests passed."
        - cmd: "npm test -- --runInBand"
          status: pass
          summary: "23 dashboard tests passed."
        - cmd: "npm run build"
          status: pass
          summary: "Dashboard TypeScript and Vite build passed."
        - cmd: "python3 -m py_compile workerctl/*.py"
          status: pass
        - cmd: "git diff --check"
          status: pass
      residual_follow_up: []

