        - "Ack validity now requires the active binding and current manager_config revision."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit: prove whether all remaining dispatch gaps are fixed, deliberately resolved, or precisely handed off."
    inputs:
      - "All task receipts."
      - "Last verification output."
      - "Current dirty diff."
      - "The residual gap list in goal.md and state.yaml."
      - "The original dispatch addition no-judgment boundary."
    constraints:
