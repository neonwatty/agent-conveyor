      - "npm run build"
      - "python3 -m unittest tests.test_workerctl.CliTests.test_qa_plan_dispatch_completion_outputs_dispatch_flow -v"
      - "python3 -m py_compile workerctl/*.py"
      - "git diff --check"
    stop_if:
      - "dashboard/client/styles.css contains unrelated unowned changes that cannot be isolated safely."
      - "dashboard --task behavior is ambiguous after reading the server data flow."
      - "Suppressed-signal visibility requires a new source of truth not already represented in DB/telemetry/audit."
      - "Need files outside allowed_files."
      - "Verification fails twice with unrelated failures."
    receipt:
      result: done
      changed_files:
        - "dashboard/server/workerctl.ts"
        - "dashboard/server/index.ts"
        - "dashboard/server/workerctl.test.ts"
        - "dashboard/client/main.tsx"
        - "docs/manual-qa-checklist.md"
      commands:
        - cmd: "npm test -- --runInBand"
          status: pass
        - cmd: "npm run build"
          status: pass
        - cmd: "python3 -m unittest tests.test_workerctl.CliTests.test_qa_plan_dispatch_completion_outputs_dispatch_flow -v"
          status: pass
        - cmd: "python3 -m py_compile workerctl/*.py && git diff --check"
          status: pass
      summary: "Implemented dashboard/operator visibility hardening. dashboard --task now drives the observed task instead of always using the dashboard-bound task; the dashboard queries filtered dispatch_signal_suppressed telemetry directly and counts it in health; heartbeat UI now renders dispatcher, iteration, processed count, and dry-run/live mode; generic manual QA checklist includes dispatch completion checks."
      gap_evidence:
        - "dashboardTaskName prefers explicit options.task over the bound dashboard task and is unit-tested."
        - "buildWorkerctlArgs supports filtered telemetry queries used for durable suppressed dispatch signal counts."
        - "dispatchHealth accepts filtered suppressed telemetry outside snapshot recent events and is unit-tested."
        - "Dispatch heartbeat details are rendered in dashboard/client/main.tsx."
        - "docs/manual-qa-checklist.md now includes dispatch completion, audit/correlation, and dashboard checks."

  - id: T007
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Record any deliberately deferred residual gaps as repo-local follow-up notes or issue text after implementation decisions are made."
    inputs:
      - "T001 through T006 receipts."
      - "Any Judge decisions that classify a gap as follow-up or acceptable asymmetry."
    constraints:
      - "Only edit this goal's control files or approved documentation/handoff notes."
      - "Do not claim a deferred gap is fixed."
      - "Ask the operator before creating external GitHub issues unless publishing was explicitly approved in the active task."
    expected_output:
      - "Deferred-gap handoff text or explicit statement that no follow-up remains."
      - "Board receipt linking each deferred item to its rationale."
    receipt:
      result: done
