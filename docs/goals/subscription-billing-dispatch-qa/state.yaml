version: 2

goal:
  title: "Subscription Billing Dispatch QA"
  slug: "subscription-billing-dispatch-qa"
  kind: specific
  tranche: "Fresh-from-main dashboard QA plus a durable subscription-billing lab scenario that proves Dispatch routing visually and repeatably."
  status: done
  oracle:
    signal: "Dashboard-visible Dispatch evidence from a clean QA run plus committed/pushed lab scenario verification."
    cadence: "after each Worker package and at final audit"
    final_proof: "Fresh run evidence includes Dispatch active, worker_task_complete notification, source event, manager cycle consumption, finish_task success, task done, all criteria satisfied, and pushed lab scenario docs/tests."
  intake:
    original_request: "Plan the next QA lab with GoalBuddy."
    interpreted_outcome: "Prepare a GoalBuddy run that builds and validates a harder subscription-billing Dispatch QA lab after confirming fresh-from-main dashboard behavior."
    input_shape: specific
    audience: "operator and future workerctl dashboard QA runs"
    authority: requested
    proof_type: demo
    completion_proof: "A clean manual QA cycle from fresh main proves Dispatch routing in the dashboard and the new subscription-billing scenario is repeatable, committed, and pushed."
    likely_misfire: "Creating a complex lab fixture without proving the manager/worker conversation flows through Dispatch in the dashboard."
    blind_spots_considered:
      - "Scenario complexity can bury the Dispatch evidence."
      - "Pane text can look successful even when Dispatch chains are missing."
      - "Product and lab repos can drift after the new lab repo was created."
      - "Cleanup/reset behavior must be repeatable after both success and failure."
    existing_plan_facts:
      - "Product PR #144 is merged."
      - "QA lab repo exists at neonwatty/workerctl-dispatch-lab."
      - "Existing lab scenarios include complex-refactor and support-triage."
      - "Next harder scenario should cover subscription billing, pricing, invoices, entitlement windows, refunds or credits, and audit summaries."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

