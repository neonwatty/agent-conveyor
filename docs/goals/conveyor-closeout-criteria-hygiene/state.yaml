      evidence:
        - "T001 found criteria-plan warning hook at src/cli/typescript-runtime.ts:15900."
        - "T001 found recipe metadata surface at src/cli/typescript-runtime.ts:18137 and docs surface in docs/manager-recipes.md."
        - "T001 found generated manager prompts at src/cli/typescript-runtime.ts:19843 and :20124."
        - "T001 found packaged skill source at skills/manage-codex-workers/SKILL.md and package inclusion at package.json:23."
      subgoal_contract: null
      parallel_safety: null
      blocked_tasks: []
      missing_evidence: []
      required_board_updates:
        - "Activate T003 with allowed files and verification commands."

