# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Conveyor Closeout Criteria Hygiene"
  slug: "conveyor-closeout-criteria-hygiene"
  kind: specific
  tranche: "Implement one bounded hardening tranche that separates manager closeout proof from worker/task acceptance criteria."
  status: done
  oracle:
    signal: "Targeted tests plus direct inspection show Conveyor warns or guides away from self-referential closeout criteria while preserving legitimate finish-task QA."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM audit cites changed files, targeted tests, direct inspection of generated prompts/docs, and the strongest realistic failure mode."
  intake:
    original_request: "Plan with GoalBuddy prep whether the dogfood closeout-criteria lesson needs package or skill work."
    interpreted_outcome: "Conveyor should make it hard for manager closeout mechanics to become blocking task acceptance criteria."
    input_shape: specific
    audience: "Conveyor maintainers and operators"
    authority: requested
    proof_type: test
    completion_proof: "Package/docs/skill guidance are updated and verified so closeout proof lives in manager final report or audit evidence, not open accepted criteria."
    likely_misfire: "Only prose changes land, leaving generated manager prompts or criteria-plan suggestions able to seed self-referential blocking criteria."
    blind_spots_considered:
      - "Legitimate Conveyor QA may intentionally test finish-task and should not be blocked."
      - "Installed user skill text and packaged skill source may diverge."
      - "Docs-only fixes may not affect generated app-visible manager prompts."
      - "A warning must be visible enough to change manager behavior without corrupting existing criteria flows."
    existing_plan_facts:
      - "Add a criteria hygiene warning/classification rather than a universal hard blocker."
      - "Add recipe or generated-prompt language that closeout proof belongs in final report/audit evidence."
      - "Update manage-codex-workers skill guidance."
      - "Verify with targeted tests and direct inspection."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/conveyor-closeout-criteria-hygiene/"
    command: "npx goalbuddy board docs/goals/conveyor-closeout-criteria-hygiene"

active_task: null

tasks:
