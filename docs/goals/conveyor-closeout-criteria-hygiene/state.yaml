      - "docs/manager-recipes.md"
      - "docs/agent-evidence-playbook.md"
      - "src/cli/typescript-runtime.ts"
      - "src/cli/typescript-runtime.test.ts"
      - "packaged or installed manage-codex-workers skill source, if present"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not inspect unrelated Foil iOS or product code."
      - "Prefer exact file/line evidence and existing tests over assumptions."
    expected_output:
      - "Surfaces that can seed or suggest acceptance criteria."
      - "Current behavior for criteria-plan, manager recipes, generated manager prompts, and worker handoff text."
      - "Whether skill source lives in this repo, installed user config, package artifacts, or both."
      - "Recommended largest safe Worker slice with allowed_files, verify commands, and stop_if."
    receipt:
      result: done
      summary: "Mapped criteria-plan, manager recipes, generated prompts, docs, and packaged skill surfaces. The package can implement a non-blocking closeout-criteria warning plus prompt/docs guidance without schema migration."
      evidence:
        - "src/cli/typescript-runtime.ts:15900 criteria-plan builds suggestions and warnings from parsed worker text."
        - "src/cli/typescript-runtime.ts:15912 parseWorkerCriteriaResponse only warns for missing headings or empty bullets."
        - "src/cli/typescript-runtime.ts:15983 makeCriteriaSuggestion currently turns every accepted-section item into an accepted worker_proposed suggestion."
        - "src/cli/typescript-runtime.ts:18137 MANAGER_RECIPES has acceptance, evidenceGates, epilogues, and guidelines but no final-report/closeout-proof field."
        - "src/cli/typescript-runtime.ts:18300 managerRecipeSummary exposes recipe metadata used by manager-recipes --show."
        - "src/cli/typescript-runtime.ts:20124 generated manager bootstrap tells managers to finish after accepted criteria close, but does not separate closeout proof from criteria."
        - "src/cli/typescript-runtime.ts:19843 disposable app heartbeat prompt tells manager to run terminal closeout after criteria close."
        - "src/cli/typescript-runtime.ts:7820 worker prompt already says workers must not call conveyor finish-task."
        - "src/cli/typescript-runtime.test.ts:1353 covers criteria-plan suggestions and read-only behavior."
        - "src/cli/typescript-runtime.test.ts:4502 and :5200 cover generated manager/worker prompt text."
        - "skills/manage-codex-workers/SKILL.md:654 covers living criteria but lacks closeout-proof separation guidance."
        - "package.json:23 includes skills/**/* in npm package files."
      facts:
        - "Largest safe Worker slice can update src/cli/typescript-runtime.ts, src/cli/typescript-runtime.test.ts, README.md, docs/manager-recipes.md, and skills/manage-codex-workers/SKILL.md."
        - "Use a warning/classification, not a hard blocker, so legitimate Conveyor QA finish-task tests remain possible."
        - "Installed user skill can be refreshed later with conveyor install-skills; repo source is the package source."
      contradictions: []
      ambiguity_requiring_judge:
        - "Whether to add a formal recipe field such as final_report_requirements now, or keep v1 to warnings plus prompt/docs guidance."
      commands:
        - cmd: "npx goalbuddy prompt docs/goals/conveyor-closeout-criteria-hygiene"
          status: pass
        - cmd: "rg -n 'criteria-plan|finish-task|worker_handoff|MANAGER_RECIPES' src/cli/typescript-runtime.ts src/cli/typescript-runtime.test.ts README.md docs/manager-recipes.md docs/agent-evidence-playbook.md package.json"
          status: pass
        - cmd: "find . -maxdepth 4 -type f \\( -name 'SKILL.md' -o -name '*manage-codex-workers*' \\) | sort"
          status: pass
      note_needed: false

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Convert Scout findings into a precise implementation decision."
    inputs:
