      - "Default state root must remain clean before and after the drill."
      - "Do not contaminate default live worker/manager state."
      - "Record failed command behavior, recovery path, replay/export, reconcile before/after, and cleanup."
      - "Expected failures must be labeled expected_failure, not pass."
      - "Scrub evidence before packaging."
    allowed_files:
      - "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-7-failure-recovery/**"
