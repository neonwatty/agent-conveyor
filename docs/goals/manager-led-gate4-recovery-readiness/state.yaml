      - "tmux kill-session -t qa-g4-s7-worker"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state scripts/workerctl cycle qa-g4-s7-recovery --busy-wait-seconds 1"
