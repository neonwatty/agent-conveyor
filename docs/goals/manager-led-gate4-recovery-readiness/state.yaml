      - "Reject if fake success events appear in audit or replay."
    expected_output:
      - "Scenario 7 passed | partial | blocked."
      - "Evidence mapping."
      - "Missing evidence or exact blocker."
      - "Helper-fix objective if needed."
    receipt:
      decision: "scenario_7_passed"
      evidence_mapping:
        dead_or_degraded_detection: "cycle after worker kill reported worker_alive false and pane_signal.degraded true with missing-pane reason."
        reconcile_detection: "reconcile reported dead pid session qa-g4-s7-worker and stuck task qa-g4-s7-recovery."
        reconcile_apply: "reconcile --apply marked the binding invalid and sessions gone; final isolated reconcile was clean."
        default_state_protection: "Default state reconcile stayed clean before and after isolated drill."
        no_fake_success: "Replay contained observe entries only; no success event was recorded for the killed worker."
      next: "Proceed to T006 isolated Scenario 8 guardrail drill."

  - id: T006
    type: worker
    assignee: Worker
    status: completed
    reasoning_hint: high
    objective: "Run Scenario 8 guardrail drill if prior Gate 4 slices allow continuing."
    inputs:
      - "T001 receipt"
      - "T003/T005 receipts"
      - "Scenario 8 runbook selected by T001"
    constraints:
      - "Run only guardrail commands approved by T001."
      - "Dangerous commands should fail closed unless T001 explicitly authorizes a safe isolated success case."
      - "Expected failures must be labeled expected_failure, not pass."
      - "Audit and mutation-audit must not imply success for failed guardrail attempts."
      - "Postflight cleanup must be clean."
      - "Scrub evidence before packaging."
    allowed_files:
      - "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-8-guardrail-drill/**"
      - "docs/live-qa-log.md"
      - "docs/goals/manager-led-gate4-recovery-readiness/state.yaml"
    verify:
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl doctor"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl pair --task qa-g4-s8-guardrail --worker-name qa-g4-s8-worker --manager-name qa-g4-s8-manager --cwd $PWD --task-prompt <file>"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl finish-task qa-g4-s8-guardrail --require-criteria-audit"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl deregister qa-g4-s8-worker"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl request-worker-compact qa-g4-s8-guardrail --strict-decisions --dry-run"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl commands --task qa-g4-s8-guardrail --json"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl mutation-audit --task qa-g4-s8-guardrail --json"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state scripts/workerctl reconcile --apply --stale-cycles-seconds 1"
      - "scripts/workerctl reconcile --stale-cycles-seconds 1"
      - "tmux ls"
      - "git status --short --branch"
    stop_if:
      - "A dangerous command succeeds without required setup."
      - "A failed guardrail command leaves active-session, binding, or audit drift."
      - "Error messages do not name the missing permission, handoff, criterion, binding, or state requirement."
      - "Audit or mutation-audit implies false success."
    expected_output:
      - "Scenario 8 evidence bundle."
      - "Receipts for each guardrail attempt with expected_failure or pass status."
      - "Audit/mutation-audit/postflight evidence."
    receipt:
      result: "blocked"
      state_root: "/tmp/codex-terminal-manager-g4-s8-state"
      task_run: "qa-g4-s8-guardrail"
      disposable_sessions:
        worker: "qa-g4-s8-worker"
        manager: "qa-g4-s8-manager"
      evidence:
        worker_prompt: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-8-guardrail-drill/worker-prompt.md"
        export: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-8-guardrail-drill/export/"
      expected_failures:
        - command: "finish-task qa-g4-s8-guardrail --require-criteria-audit"
          exit_code: 1
          denial: "Named accepted criterion #1 still open."
          audited: false
        - command: "deregister qa-g4-s8-worker"
          exit_code: 1
          denial: "Named active task and binding preventing deregister."
          audited: false
