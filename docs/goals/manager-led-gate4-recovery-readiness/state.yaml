# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Manager-Led Gate 4 Recovery Readiness"
  slug: "manager-led-gate4-recovery-readiness"
  kind: existing_plan
  tranche: "Validate and run Gate 4 recovery readiness: scenarios 5, 7, and 8."
  status: completed
  intake:
    original_request: "Merge PR #59 and set up Gate 4 with GoalBuddy."
    interpreted_outcome: "A fresh GoalBuddy board exists for Gate 4 recovery readiness after Gate 3 is merged."
    input_shape: existing_plan
    audience: "Jeremy and future meaningful codex-terminal-manager dogfood runs"
    authority: requested
    proof_type: artifact
    completion_proof: "A final audit records Gate 4 passed or the exact blocker, backed by live or isolated recovery-drill evidence."
    likely_misfire: "A recovery drill causes real state contamination, or a failed command is treated as success because the board only checks command exit codes."
    blind_spots_considered:
      - "Failure injection can contaminate the default workerctl state root unless isolated deliberately."
      - "Scenario 5, 7, and 8 have different risk profiles and should not be collapsed into one vague worker task."
      - "Guardrail failures must be audited as expected failures without implying success."
      - "Manager behavior matters: repeated generic nudges after a known blocker should fail Scenario 5."
      - "No fake success events in audit or replay is the core Gate 4 invariant."
    existing_plan_facts:
      - "Gate 3 passed and recommended Gate 4 recovery readiness."
      - "Gate 4 requires Scenarios 5, 7, and 8."
      - "Scenario 7 explicitly calls for isolated WORKERCTL_STATE_ROOT for destructive or synthetic variants."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: configured
    url: "http://goalbuddy.localhost:41737/manager-led-gate4-recovery-readiness/"
    command: "npx goalbuddy board docs/goals/manager-led-gate4-recovery-readiness"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: judge
    assignee: Judge
    status: completed
    reasoning_hint: high
    objective: "Validate the Gate 4 recovery readiness runbook before starting any live or failure-injection work."
    inputs:
      - "docs/superpowers/plans/2026-05-16-dogfood-reliability-ladder.md Scenario 5, Scenario 7, Scenario 8, and Gate 4 sections"
      - "docs/goals/manager-led-scenario-3-gate3/state.yaml"
      - "docs/live-qa-log.md latest Gate 3 entry"
      - "workerctl help for pair, manager-config, cycle, reconcile, replay, export-task, commands, mutation-audit, criteria, finish-task, stop-task, deregister, request-worker-compact, compact-worker, session-interrupt, open, and open-manager/open-worker"
    constraints:
      - "Read-only."
      - "Do not start sessions."
      - "Do not kill tmux sessions."
      - "Do not run destructive or guardrail-denied commands."
      - "Pick isolated state-root strategy for Scenario 7 destructive/synthetic failure drills."
      - "Specify exact disposable names, evidence paths, allowed_files, verify commands, and stop_if conditions for T002, T004, and T006."
      - "Reject any runbook where a failed command can be recorded as success without an explicit expected-failure receipt."
    expected_output:
      - "Decision: run Gate 4 now, implement helper first, or block."
      - "Exact Worker objective for Scenario 5 intentional blocker task."
      - "Exact Worker objective for Scenario 7 failure recovery drill."
      - "Exact Worker objective for Scenario 8 guardrail drill."
      - "Isolation strategy for destructive/synthetic variants."
      - "Evidence requirements proving no fake success events."
      - "Stop conditions for each scenario."
    receipt:
      decision: run_gate_4_now
      summary: "Gate 4 can proceed with one default-state blocker scenario and isolated state roots for destructive recovery and guardrail drills."
      evidence_root: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/"
      isolation_strategy:
        scenario_5: "Use the default workerctl state root with disposable names because this is a non-destructive live manager/worker behavior test."
        scenario_7: "Use WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state for killed/stale/partial lifecycle drills, then export scrubbed evidence into the evidence root."
        scenario_8: "Use WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state for guardrail-denied lifecycle commands, then export scrubbed evidence into the evidence root."
        default_state_guard: "Capture default-state reconcile/tmux/git status before and after isolated drills; any default-state drift blocks Gate 4."
      scenario_5_worker_objective: "Run a disposable manager-led task named qa-g4-s5-blocker with worker qa-g4-s5-worker and manager qa-g4-s5-manager. The worker must encounter an intentional missing prerequisite, such as a nonexistent command or file, report the blocker honestly, and avoid fake completion. The manager must classify the blocker, record a decision or nudge rationale, ask at most one narrowing question if useful, and stop or finish in a blocked/narrowed state without repeated generic nudges."
      scenario_7_worker_objective: "Under isolated WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state, create a disposable pair, kill or stale the worker side mid-task, run cycle/reconcile/reconcile --apply, and prove dead or degraded state is reported, recovery is precise, replay/export explain the failure, failed mutating actions do not create fake success, and cleanup leaves both isolated and default state clean."
      scenario_8_worker_objective: "Under isolated WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s8-state, run approved guardrail-denied attempts only: finish-task with required criteria audit while criteria remain open, deregister a bound active session, request-worker-compact --strict-decisions --dry-run without a qualifying manager decision, and any optional open/session-interrupt dry-run only if it cannot mutate real state. Each denied command must be recorded as expected_failure with nonzero exit and an error naming the missing requirement."
      no_fake_success_requirements:
        - "Every expected failure receipt must include command, exit status, stdout/stderr path, and why the failure was expected."
        - "commands, mutation-audit, replay, and export evidence must not contain a success entry for a denied or failed action."
        - "Any failed command that records a misleading success blocks the gate and becomes the next helper-fix objective."
      stop_conditions:
        scenario_5:
          - "Manager continues generic nudging after the blocker is known."
          - "Worker claims completion after a failed prerequisite and manager accepts it."
          - "Replay/audit cannot show the blocker, manager response, and final blocked/narrowed state."
        scenario_7:
          - "Failure injection touches non-disposable sessions or the default state root."
          - "reconcile cannot explain or clean stale state."
          - "A failed mutating action is recorded as success."
        scenario_8:
          - "A dangerous command succeeds without required setup."
          - "A failed guardrail command leaves active-session, binding, or audit drift."
          - "The denial message does not name the missing permission, handoff, criterion, binding, or state requirement."

  - id: T002
    type: worker
    assignee: Worker
    status: completed
    reasoning_hint: high
    objective: "Run Scenario 5 intentional blocker QA if T001 approves it."
    inputs:
      - "T001 receipt"
      - "Scenario 5 runbook selected by T001"
    constraints:
      - "This is live QA only, not meaningful project work."
      - "Use disposable names and evidence path selected by T001."
      - "Manager must recognize blocker evidence and change strategy instead of repeated generic nudges."
      - "Record blocker classification, manager decision/nudge rationale, replay, and cleanup."
      - "Scrub evidence before packaging."
    allowed_files:
      - "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/**"
      - "docs/live-qa-log.md"
      - "docs/goals/manager-led-gate4-recovery-readiness/state.yaml"
    verify:
      - "scripts/workerctl pair --task qa-g4-s5-blocker --worker-name qa-g4-s5-worker --manager-name qa-g4-s5-manager --cwd $PWD --task-prompt <file>"
      - "scripts/workerctl manager-config qa-g4-s5-blocker --mode guided --objective <blocker-objective> --acceptance <blocker-acceptance> --guideline <guardrails>"
      - "scripts/workerctl cycle qa-g4-s5-blocker --busy-wait-seconds 5"
      - "scripts/workerctl replay qa-g4-s5-blocker --json"
      - "scripts/workerctl commands --task qa-g4-s5-blocker --json"
      - "scripts/workerctl mutation-audit --task qa-g4-s5-blocker --json"
      - "scripts/workerctl export-task qa-g4-s5-blocker --output docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/export"
      - "scripts/workerctl reconcile --stale-cycles-seconds 1"
      - "tmux ls"
      - "git status --short --branch"
    stop_if:
      - "T001 does not approve this live run."
      - "T001 does not provide exact names, evidence path, and verify commands."
      - "The manager continues generic nudging after blocker is known."
      - "The worker claims completion after a failed prerequisite and the manager accepts it."
      - "Replay/audit cannot show the blocker and manager response."
      - "Cleanup leaves active disposable sessions or stuck tasks."
    expected_output:
      - "Scenario 5 evidence bundle."
      - "Receipt with blocker classification and manager response."
      - "Postflight cleanup state."
    receipt:
      result: "completed_with_caveat"
      task_run: "qa-g4-s5-blocker-run2"
      disposable_sessions:
        worker: "qa-g4-s5-worker-run2"
        manager: "qa-g4-s5-manager-run2"
      evidence:
        worker_prompt: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/worker-prompt.md"
        manager_config: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/manager-config.md"
        attempt_1_export: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/attempt-1-export/"
        run2_export: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-5-intentional-blocker/run2-export/"
      observed:
        - "Attempt 1 used workspace-write sandbox and exposed manager tmux inspection permission friction; it was exported and stopped before rerun."
        - "Run 2 worker verified docs/live-qa-artifacts/nonexistent-gate4-prerequisite.txt was missing, did not edit files, did not fabricate evidence, and asked for a corrected prerequisite."
        - "Run 2 manager inspected worker pane evidence, classified the missing-prerequisite blocker, and recorded manager decision id 12."
        - "stop_task command command-63097cd1-0505-45c3-b920-1cf5c023761f linked cleanly to decision id 12."
        - "No generic nudges were sent to the worker after blocker identification."
      caveat: "The manager needed a targeted PM nudge with the exact record-decision/stop-task command pattern after spending too long discovering command shape; this is a usability/reliability follow-up but did not create fake success."
      cleanup:
        reconcile: "scripts/workerctl reconcile --stale-cycles-seconds 1 returned no dangling bindings, dead pid sessions, or stuck tasks."
        tmux: "No qa-g4-s5/codex-qa-g4 sessions remained after cleanup."

  - id: T003
    type: judge
    assignee: Judge
    status: completed
    reasoning_hint: high
    objective: "Audit Scenario 5 intentional blocker evidence."
    inputs:
      - "T001/T002 receipts"
      - "Scenario 5 evidence bundle"
      - "Replay/audit/commands"
      - "Current cleanup state"
    constraints:
      - "Read-only."
      - "Reject if the manager repeated generic nudges after blocker identification."
      - "Reject if replay/audit implies fake success."
    expected_output:
      - "Scenario 5 passed | partial | blocked."
      - "Evidence mapping."
      - "Missing evidence or exact blocker."
      - "Helper-fix objective if needed."
    receipt:
      decision: "scenario_5_pass_with_caveat"
      evidence_mapping:
        blocker_visible: "Worker pane and export show MISSING: docs/live-qa-artifacts/nonexistent-gate4-prerequisite.txt."
        manager_response: "Replay shows manager decision id 12 classifying intentional missing-prerequisite blocker."
        no_fake_completion: "Worker explicitly stopped and did not claim completion; mutation-audit links only stop_task success to the manager stop decision."
        no_repeated_generic_nudges: "Worker received no repeated generic nudges after blocker identification."
        cleanup: "Reconcile and tmux postflight clean."
      caveat: "Manager command-discovery friction required one targeted PM nudge with exact command syntax. Continue Gate 4, but carry this as a reliability finding."
      next: "Proceed to T004 isolated Scenario 7 failure recovery drill."

