      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state scripts/workerctl replay qa-g4-s7-recovery --json"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state scripts/workerctl commands --task qa-g4-s7-recovery --json"
      - "WORKERCTL_STATE_ROOT=/tmp/codex-terminal-manager-g4-s7-state scripts/workerctl mutation-audit --task qa-g4-s7-recovery --json"
      - "scripts/workerctl reconcile --stale-cycles-seconds 1"
      - "tmux ls"
      - "git status --short --branch"
    stop_if:
