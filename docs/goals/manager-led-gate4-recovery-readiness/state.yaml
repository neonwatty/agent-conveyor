      cleanup:
        stop_task: "stop-task --stop-worker --strict-decisions --decision-id 1 killed the disposable manager and worker."
        isolated_reconcile: "Clean."
        default_reconcile: "Clean."
        tmux: "No qa-g4-s8/codex-qa-g4-s8 sessions remained."

  - id: T007
    type: judge
    assignee: Judge
    status: completed
    reasoning_hint: high
    objective: "Audit whether Scenario 5, 7, and 8 evidence unlocks Gate 4."
    inputs:
      - "T001 through T006 receipts"
      - "Scenario 5, 7, and 8 evidence bundles"
      - "Dogfood reliability ladder Gate 4 section"
      - "Current cleanup and git state"
    constraints:
      - "Read-only."
      - "Reject Gate 4 if any required scenario is missing, partial, or ambiguous."
      - "Reject Gate 4 if failure drills contaminate default state or fake success appears in audit/replay."
    expected_output:
      - "Gate 4 passed | partial | blocked."
      - "Evidence mapped to every Gate 4 requirement."
      - "Fake-success audit result."
      - "Default-state cleanup result."
      - "Next Worker objective if a helper fix is needed."
    receipt:
      decision: "gate_4_passed_after_scenario_8_rerun"
      full_outcome_complete: true
      scenario_results:
        scenario_5: "pass_with_caveat"
        scenario_7: "passed"
        scenario_8: "passed_after_fix"
      evidence_mapping:
        scenario_5: "Worker blocker and manager decision id 12 are present; mutation-audit linked stop_task to the manager decision with no warnings."
        scenario_7: "Isolated killed-worker drill reported degraded/dead state, reconcile detected and cleaned stale state, and default state remained clean."
        scenario_8: "Initial guardrail drill blocked because denied attempts were not recorded. Follow-up fix PR #61 added durable expected-failure audit records, and rerun evidence in docs/live-qa-artifacts/2026-05-16-gate4-scenario8-rerun shows all three denied attempts in commands, mutation-audit, and replay."
