      - "Receipt proving dead/degraded state detection, reconcile behavior, recovery path, and default-state postflight."
    receipt:
      result: "passed"
      state_root: "/tmp/codex-terminal-manager-g4-s7-state"
      task_run: "qa-g4-s7-recovery"
      disposable_sessions:
        worker: "qa-g4-s7-worker"
        manager: "qa-g4-s7-manager"
      evidence:
        worker_prompt: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-7-failure-recovery/worker-prompt.md"
        export: "docs/live-qa-artifacts/2026-05-16-gate4-recovery-readiness/scenario-7-failure-recovery/export/"
      observed:
        - "Initial isolated cycle reported worker_alive true and manager_alive true."
        - "After killing codex-qa-g4-s7-worker, cycle reported worker_alive false and pane_signal.degraded true with a tmux capture failure naming the missing pane."
        - "reconcile detected qa-g4-s7-worker as a dead pid session and qa-g4-s7-recovery as a stuck task."
        - "reconcile --apply invalidated binding-fbb53720-1b78-4116-9b80-2c3bdf6a9660 and marked qa-g4-s7-worker gone."
        - "After killing the disposable manager, reconcile --apply marked qa-g4-s7-manager gone."
        - "Final isolated reconcile reported no dangling bindings, dead pid sessions, or stuck tasks."
        - "Default state reconcile reported no dangling bindings, dead pid sessions, or stuck tasks."
      no_fake_success: "commands --task qa-g4-s7-recovery --json returned [] before cleanup; replay contained only observe entries for the failure state, not a fake success."
      cleanup:
        isolated_active_sessions: "[]"
        tmux: "No qa-g4-s7/codex-qa-g4-s7 sessions remained."
        default_reconcile: "Clean."

  - id: T005
    type: judge
    assignee: Judge
    status: completed
    reasoning_hint: high
    objective: "Audit Scenario 7 failure recovery evidence."
    inputs:
