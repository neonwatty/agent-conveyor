        fake_success: "Denied guardrail attempts now record failed expected_failure commands; no fake success appears in audit or replay."
      blocker: null
      helper_fix_objective: "Completed in PR #61: durable command/audit records for guardrail-denied attempts before raising CLI errors, with explicit expected_failure/failed state and no success implication."

  - id: T008
    type: worker
    assignee: Worker
    status: completed
    reasoning_hint: default
    objective: "Implement the smallest local helper fix selected by T007 if Gate 4 exposes an actionable tooling gap."
    allowed_files: []
    verify: []
    stop_if:
      - "T007 does not provide allowed_files."
      - "The issue is a QA/evidence gap rather than a local code/helper gap."
      - "The fix requires product direction, credentials, destructive actions, or broad redesign."
      - "The fix would touch files outside T007 allowed_files."
      - "Verification fails twice with the same unexplained failure."
    expected_output:
      - "Changed files and verification commands, or a blocked receipt explaining why no safe fix was possible."
