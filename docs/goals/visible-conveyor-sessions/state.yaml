        - "src/runtime/app-autonomy.ts:509"
        - "src/cli/typescript-runtime.ts:19612"
        - "src/cli/typescript-runtime.ts:19700"
        - "src/cli/typescript-runtime.ts:18818"
        - "src/cli/typescript-runtime.test.ts:2684"
        - "src/cli/typescript-runtime.test.ts:809"
