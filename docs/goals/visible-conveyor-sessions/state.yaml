version: 2

goal:
  title: "Visible Conveyor Sessions"
  slug: "visible-conveyor-sessions"
  kind: specific
  tranche: "Implement and verify live, reviewable manager-worker session output for app-native Conveyor loops."
  status: done
  oracle:
    signal: "Fresh app-native manager-worker dogfood loop where both live Codex sessions visibly show poll, receive, work, send, and dispatch transcript blocks while the work happens."
    cadence: "after each Worker package and at final audit"
    final_proof: "Package tests pass, a fresh dogfood run shows live visible transcript in both sessions, and task-level Dispatch receipts match the visible session story."
  intake:
    original_request: "Make a detailed /goal plan to fix Conveyor manager-worker sessions so live Codex/tmux sessions show what is going on as if the operator drove them."
    interpreted_outcome: "Agent Conveyor app-native loops default to a visible-session protocol where the actual manager and worker sessions narrate every consumed inbox item and outgoing Conveyor message live."
    input_shape: specific
    audience: "Agent Conveyor operators using Codex app or tmux manager-worker loops"
    authority: requested
    proof_type: demo
    completion_proof: "A fresh dogfood pair proves live visible session output plus matching durable inbox receipts; no after-the-fact replay is required to understand the run."
    likely_misfire: "Add better replay/status/SQLite summaries while the live manager and worker sessions still look idle, silent, or disconnected."
    blind_spots_considered:
      - "Prompt-only enforcement may be cooperative unless generated prompts and tests make the protocol explicit."
      - "Heartbeat DONT_NOTIFY language can suppress the exact output the operator expects."
      - "Ralph run summaries can be blind to task-level Dispatch when the run row is already finished."
      - "tmux push flows and Codex app pull flows need the same human-readable contract."
      - "A later transcript replay would not satisfy the operator's requirement."
    existing_plan_facts:
      - "Do not make after-the-fact replay the primary fix."
      - "The actual manager and worker agents must print the visible transcript during their own turns."
      - "Any consumed inbox item must be visible in the consuming session before action and visible again in the final receipt."
      - "Outgoing enqueue-notify-manager/enqueue-nudge-worker and bounded dispatch results must be shown in the sending session."
      - "Idle polls may be short, but cannot hide consumed work."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: bundled_not_installed
  worker: bundled_not_installed
  judge: bundled_not_installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/visible-conveyor-sessions/"
    command: "npx goalbuddy board docs/goals/visible-conveyor-sessions"

active_task: null

