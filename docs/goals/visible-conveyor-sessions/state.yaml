      - "src/cli/typescript-runtime.ts"
      - "src/runtime/app-autonomy.ts"
      - "src/runtime/dispatch.ts"
      - "src/cli/typescript-runtime.test.ts"
      - "README.md"
      - "docs/manager-recipes.md"
      - "Recent Deckchecker dogfood evidence from task deckchecker-issue-1181-ralph-visible"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Preserve the distinction between live session output and after-the-fact replay."
      - "Prefer exact file/function/test references over broad descriptions."
    expected_output:
      - "Prompt surfaces that must include the visible-session protocol."
      - "Status surfaces that currently mislead operators."
      - "Existing tests to extend."
      - "Recommended first Worker package with allowed_files, verify commands, and stop conditions."
    receipt:
      result: done
      note: "notes/T001-scout-map.md"
      summary: "Mapped app-native Conveyor prompt/status surfaces. Transport works through pull-required inboxes; the first fix should be generated prompt protocol, not replay. Status repair is a separate package because loop-status is deliberately run-scoped."
