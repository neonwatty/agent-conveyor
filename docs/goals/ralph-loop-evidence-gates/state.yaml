      - "Blocking cannot happen before both tmux push and worker-inbox notification creation."
      - "No reliable structured evidence model or safe reuse path is found."
      - "No reliable way is found to prove no worker delivery and allowed retry."
      - "Required files fall outside allowed_files."
      - "Verification fails twice for the same unknown reason."
    expected_output:
