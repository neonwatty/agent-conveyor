        - cmd: "npm test -- --runInBand dashboard/server/workerctl.test.ts"
          status: pass
          summary: "40 dashboard/server tests passed."
        - cmd: "npm run build"
          status: pass
          summary: "TypeScript and Vite build passed."
        - cmd: "python3 -m unittest tests.test_workerctl -v"
          status: pass
          summary: "Full Python suite passed: 515 tests after the review fix."
        - cmd: "npm test"
          status: pass
          summary: "Full dashboard test suite passed: 40 tests."
        - cmd: "git diff --check"
          status: pass
      evidence:
        - "Detailed receipt: docs/goals/ralph-loop-evidence-gates/notes/T003-worker-implementation.md"
        - "Missing ci_green no-tmux path creates no routed notification and leaves worker inbox empty."
        - "Missing ci_green tmux path does not call send_text_to_session."
        - "Satisfied criterion evidence with evidence_type=ci_green, ralph_loop_run_id, and iteration=1 allows a fresh requested iteration 2 command."
        - "Replay/audit expose reason=missing_ci_green_evidence and missing_evidence=[ci_green]."
        - "Dashboard blocked-policy summaries expose and render missing_evidence."
        - "Malformed required_before_continue metadata is rejected fail-closed instead of silently disabling the gate."

