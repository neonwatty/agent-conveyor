          status: pass
          summary: "Replay showed blocked attempt, evidence receipt, allowed attempt, and routed notification."
      evidence:
        - "Detailed receipt: docs/goals/ralph-loop-evidence-gates/notes/T004-browser-qa.md"
        - "First dispatch returned state=blocked, reason=missing_ci_green_evidence, missing_evidence=[ci_green], notification_id=null, delivered=false, and target_worker_notified=false."
