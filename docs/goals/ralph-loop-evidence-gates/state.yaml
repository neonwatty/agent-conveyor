        - "workerctl/commands.py"
        - "dashboard/server/index.ts"
        - "dashboard/client/main.tsx"
        - "dashboard/server/workerctl.test.ts"
        - "tests/test_workerctl.py"
        - "docs/qa/ralph-loop.md"
        - "docs/manual-qa-checklist.md"
