      - "Manager continuation request command/decision linkage."
      - "Dispatch blocks missing evidence before delivery."
      - "Dispatch allows a fresh retry after evidence exists."
      - "Manager-visible refusal receipt with missing evidence list."
      - "Replay/audit/dashboard evidence for blocked and allowed continuation."
      - "Tests covering blocked, allowed, no-tmux, and tmux paths."
    receipt:
      result: done
      summary: "Implemented dispatcher-enforced ci_green evidence gating for Ralph-loop continue_iteration commands, including missing-evidence refusal, allowed retry after satisfied criterion evidence, replay/audit visibility, dashboard rendering, docs, and tests."
      changed_files:
