    constraints:
      - "Use --dry-run for compact and clear requests."
      - "Do not send real /compact or /clear."
      - "Use disposable task/session names prefixed qa-compact-clear-audit."
      - "Clean up disposable sessions and tmux sessions before finishing."
      - "If mutation-audit.effect is missing or wrong, stop and record the failure instead of editing implementation files."
