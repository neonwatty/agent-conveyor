# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Compact Clear Audit Receipt"
  slug: "compact-clear-audit-receipt"
  kind: existing_plan
  tranche: "Live-verify and document dry-run compact/clear mutation-audit effect records in a disposable manager/worker QA run."
  status: done
  intake:
    original_request: "Use GoalBuddy to manage the live PR #67 compact/clear audit receipt QA."
    interpreted_outcome: "A live disposable QA receipt proves dry-run compact/clear requests appear in mutation-audit with no-send effect metadata."
    input_shape: existing_plan
    audience: "Jeremy and future manager/worker dogfooding runs"
    authority: approved
    proof_type: artifact
    completion_proof: "docs/live-qa-log.md and artifact files show live mutation-audit effect.dry_run true, effect.sent false, linked nudge decisions, distinguishable compact/clear slash commands, and clean cleanup receipts."
    likely_misfire: "Re-proving commands/replay audit coverage without proving mutation-audit.effect exposes the dry-run no-send result."
    blind_spots_considered:
      - "Accidentally sending real /compact or /clear instead of --dry-run."
      - "Forgetting worker handoff or canonical worker_compact_clear permission."
      - "Leaving disposable sessions, bindings, tmux sessions, or reconcile drift behind."
      - "Documenting unit-test proof instead of a live disposable QA receipt."
    existing_plan_facts:
      - "Create a disposable task/session pair."
      - "Record a worker handoff and enable canonical worker_compact_clear permission."
      - "Run dry-run compact and clear through request-worker-compact with strict nudge decisions."
      - "Verify mutation-audit records include effect.dry_run true and effect.sent false."
      - "Capture commands, replay, export, cleanup, and QA log evidence."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/compact-clear-audit-receipt/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/compact-clear-audit-receipt"
  github_projects:
    status: not_requested
    url: null
    command: "npx goalbuddy extend github-projects"
    missing: []

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map exact live QA commands, artifact filenames, and acceptance checks for the compact/clear audit receipt."
    inputs:
      - "docs/goals/compact-clear-audit-receipt/goal.md"
