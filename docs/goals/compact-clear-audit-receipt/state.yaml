        - cmd: "scripts/workerctl mutation-audit qa-compact-clear-audit-receipt --json"
          status: pass
          evidence: "ok true, with_warnings 0; compact and clear records have effect.dry_run true and effect.sent false"
        - cmd: "scripts/workerctl finish-task qa-compact-clear-audit-receipt --reason \"Compact/clear dry-run audit receipt captured and exported.\" --require-criteria-audit --stop-manager --stop-worker"
          status: pass
