          status: mapped
        - cmd: "scripts/workerctl export-task qa-compact-clear-audit-receipt --output docs/live-qa-artifacts/2026-05-17-compact-clear-audit-receipt/export --zip"
          status: mapped
      next_task: T002

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Run the disposable compact/clear audit receipt QA and document the live evidence."
    inputs:
      - "T001 receipt"
