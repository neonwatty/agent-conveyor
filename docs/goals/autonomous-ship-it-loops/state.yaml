# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Autonomous Ship-It Loops"
  slug: "autonomous-ship-it-loops"
  kind: specific
  tranche: "Implement the first explicit PR/CI/conflict/merge lifecycle policy for visible Conveyor manager-worker loops, with local tests/docs and a dogfood or simulated QA receipt."
  status: done
  oracle:
    signal: "Focused Conveyor tests, docs/skill prompt updates, and a receipt-backed dogfood or simulated ship-it run prove explicit PR lifecycle authority, manager-only merge gating, conflict handling limits, and app-visible session behavior."
    cadence: "after each Worker package and at final audit"
    final_proof: "Final Judge/PM audit cites changed files, passing commands, dogfood or QA receipt, policy decisions, and any blocked live-GitHub operations with exact reason."
  intake:
    original_request: "Plan out with GoalBuddy prep the addition of autonomous ship-it loops."
    interpreted_outcome: "Prepare a GoalBuddy execution board for adding policy-driven ship-it loops to Conveyor manager-worker automation."
    input_shape: specific
    audience: "Conveyor operators using Codex app manager-worker sessions for repo work"
    authority: requested
    proof_type: test
    completion_proof: "A verified implementation and dogfood or QA receipt showing a bounded loop can safely create/monitor/resolve/merge under explicit policy."
    likely_misfire: "Building generic auto-merge behavior that bypasses manager verification, hides session output, or treats CI green as sufficient proof."
    blind_spots_considered:
      - "GitHub auth may be absent; local tests must not require live credentials."
      - "Merge authority must be explicit and manager-owned."
      - "Codex app worktrees may differ from manually prepared worktrees."
      - "Conflict resolution needs retry limits and exact stop conditions."
      - "Docs, installed skill copies, and npm release readiness may be separate follow-up decisions."
    existing_plan_facts:
      - "Worker can edit/test/commit/push only when policy grants those powers."
      - "Manager should verify worker claims before closeout or merge."
      - "PR create, monitor, conflict resolution, and merge should be opt-in lifecycle authorities."
      - "Manager/worker sessions should remain visibly reviewable in Codex app or tmux."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/autonomous-ship-it-loops/"
    command: "npx goalbuddy board docs/goals/autonomous-ship-it-loops"

