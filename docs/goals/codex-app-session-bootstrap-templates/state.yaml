          status: pass

  - id: T004
    type: worker
    assignee: Worker
    status: blocked
    reasoning_hint: low
    objective: "Update docs, skill guidance, and smoke coverage for the implemented bootstrap template slice."
    constraints:
      - "Keep guidance operational and concise."
      - "Do not imply create_thread or send_message_to_thread are durable task receipts."
      - "Do not touch generated dist."
    allowed_files: []
    expected_output:
      - "Docs or skill instructions for safe app bootstrap usage."
      - "Smoke or manual QA coverage for manager/worker prompt generation."
    acceptance_criteria:
      - "Operators know when to create Codex app threads, bind/register them, and start heartbeat/inbox loops."
      - "Docs preserve Dispatch/inbox/telemetry authority."
    verify: []
    stop_if:
