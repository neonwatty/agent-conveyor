version: 2

goal:
  title: "Late-Attach Support Queue Reporter"
  slug: "late-attach-support-queue-reporter"
  kind: specific
  tranche: "Create and run a late-manager-attach workerctl experiment around a small support-reporting CLI feature."
  status: done
  oracle:
    signal: "Support-reporter tests pass and dashboard plus workerctl audit prove late manager attachment, Dispatch routing, manager consumption before finish_task, closed criteria, task done, and cleanup."
    cadence: "after each setup/experiment phase and at final audit"
    final_proof: "Run id, dashboard URL, support-reporter verification command output, routed worker_task_complete source_event_id, consumed_manager_cycle_id, finish_task command id, criteria summary, task done state, and cleanup/git status."
  intake:
    original_request: "Cook up a small CLI/reporting feature task in an associated repo, start a worker on it, then attach a manager for trustworthy management."
    interpreted_outcome: "A runnable late-attach dogfood experiment proves a manager can supervise an already-started worker through auditable Dispatch evidence."
    input_shape: specific
    audience: "operator validating workerctl trust and manager behavior"
    authority: approved
    proof_type: demo
    completion_proof: "A completed late-attach workerctl run with support-reporter tests passing, dashboard/audit proof of routed completion consumed before finish_task, closed criteria, task done, and clean cleanup."
    likely_misfire: "Treating a successful toy CLI implementation as success without proving the manager attached midstream and made an auditable finish decision."
    blind_spots_considered:
      - "Worker may finish before manager attachment."
      - "Manager may trust pane text instead of Dispatch/audit evidence."
      - "Acceptance criteria may be too vague to close objectively."
      - "Dashboard may hide backend truth."
      - "Cleanup may leave stale sessions."
    existing_plan_facts:
      - "Use a standalone repo at /Users/neonwatty/Desktop/support-queue-reporter-late-attach."
      - "Use Python and pytest."
      - "Seed a half-built support queue reporter CLI."
      - "Start the worker before manager attachment."
      - "Use dashboard and workerctl audit as the trust evidence."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

