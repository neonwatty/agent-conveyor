  local:
    status: live
    url: "http://127.0.0.1:41737/late-attach-support-queue-reporter/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/late-attach-support-queue-reporter"

