# GoalBuddy v2 state.yaml
# Recovery handoff copy created after the Desktop worktree became unreadable.
# If the original worktree is restored, reconcile this board before continuing.

version: 2

goal:
  title: "Local Telemetry Platform"
  slug: "local-telemetry-platform"
  kind: existing_plan
  tranche: "Complete the local-only telemetry package for realistic manager/worker QA."
  status: active
  oracle:
    signal: "A recorded realistic manager/worker run has a local telemetry report and export bundle that reconstructs the run end-to-end: pair creation, run identity, manager cycles, decisions, commands, nudges/interruption attempts, captures, transcript segments, handoffs, task completion, errors, durations, and search results, with all verification commands passing."
    cadence: "after each Worker package and at final audit"
    final_proof: "Full verification passes; telemetry report/export from a realistic drill is committed as evidence; final Judge/PM audit records full_outcome_complete: true."
  intake:
    original_request: "Let's make a plan to implement the entire thing. I want to do this all in one Goal Buddy Prep Board."
    interpreted_outcome: "Implement the complete local-only telemetry platform for manager/worker QA, including instrumentation, query/report/export surfaces, docs, and a realistic evidence-backed drill."
    input_shape: existing_plan
    audience: "Jeremy and future operators reviewing manager/worker pairs"
    authority: approved
    proof_type: test
    completion_proof: "Full test/RC verification passes, telemetry commands can reconstruct a realistic manager/worker run, documentation explains the workflow, and a final QA drill artifact proves the event timeline is usable after the fact."
    likely_misfire: "Stopping after schema or generic logging exists, without instrumenting real control points or proving a realistic run can be analyzed."
    blind_spots_considered:
      - "Over-instrumenting noisy events instead of emitting useful structured milestones."
      - "Missing correlation IDs needed to connect run, task, binding, manager cycle, command, and sessions."
      - "Breaking replay/export compatibility while adding telemetry."
      - "Introducing non-local telemetry services despite the local-only requirement."
      - "Shipping reports that summarize vaguely but do not support postmortem debugging."
      - "Skipping a realistic manager/worker drill."
    existing_plan_facts:
      - "SQLite remains the only database for this phase."
      - "Telemetry must not leave this machine."
      - "Current foundation includes runs, telemetry_events, FTS search, workerctl runs, and automatic run_id creation from workerctl pair."
      - "Remaining work must cover instrumentation, query/report commands, export/evidence bundles, documentation, and realistic drill proof."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41740/local-telemetry-platform/"
    command: "node /Users/neonwatty/.codex/plugins/cache/goalbuddy/goalbuddy/0.3.7/skills/goalbuddy/surfaces/local-goal-board/scripts/local-goal-board.mjs --goal /Users/neonwatty/goalbuddy-boards/local-telemetry-platform --host goalbuddy.localhost --port 41740"

active_task: T009

