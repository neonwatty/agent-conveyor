      rationale: "#115 is the correct first Worker package. It is useful, bounded, reversible, and unlocks #116/#117 permission/tool dependencies without forcing Dispatch side effects. The current schema already centralizes permissions in manager_configs.permissions_json, and existing manager-config tests provide coverage anchors."
