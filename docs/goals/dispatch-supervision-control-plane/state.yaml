      - "Do not edit implementation files."
      - "Preserve the issue sequencing facts; verify them against code instead of rediscovering the product plan."
      - "Prefer exact file/function/test evidence."
    expected_output:
      - "Implementation surface map for each issue."
      - "Existing test clusters to extend."
      - "Migration/versioning risks."
      - "Recommended first Worker package with candidate allowed_files and verify commands."
    receipt:
      result: done
      note: "notes/T001-scout-map.md"
