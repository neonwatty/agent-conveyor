# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Dispatch Supervision Control Plane"
  slug: "dispatch-supervision-control-plane"
  kind: existing_plan
  tranche: "Implement issues #113-#117 in dependency order: permissions, acks, dispatch completion routing, epilogues, dual continuation review, and later dispatch queue/watch phases."
  status: complete
  oracle:
    signal: "Focused tests and final audit prove the accepted issue acceptance criteria are implemented without violating Dispatch's no-judgment boundary."
    cadence: "after each Worker package and at final audit"
    final_proof: "A final Judge/PM receipt maps issue #113-#117 acceptance criteria to passing tests, implemented CLI/schema behavior, and replay/audit visibility."
  intake:
    original_request: "Pull the related issues around #113 and make a detailed GoalBuddy plan for implementation."
    interpreted_outcome: "Prepare and execute a sequenced implementation board for the dispatch-related supervision control plane issues."
    input_shape: existing_plan
    audience: "workerctl operators, managers, workers, and future GoalBuddy-driven supervision runs"
    authority: requested
    proof_type: test
    completion_proof: "Issues #113-#117 are implemented or explicitly split/deferred with receipts, tests pass, and final audit confirms safety boundaries."
    likely_misfire: "Completing a plan or a broad Dispatch skeleton while leaving the actual permission, ack, routing, epilogue, and review behavior unimplemented or untested."
    blind_spots_considered:
      - "Dispatch could accidentally become a decision maker instead of a mechanical router."
      - "Full queue/watch implementation could pull in non-idempotent tmux side effects before completion routing is stable."
      - "Flat manager permissions must remain backwards compatible while the taxonomy lands."
      - "Subagent review can be anchored or self-reviewing unless worker/manager proposals and reviewer isolation are enforced."
      - "Epilogue plugin generalization would distract from the named built-in step model."
      - "Correlation IDs need to be added early or replay/dashboard chains become disconnected."
    existing_plan_facts:
      - "#113 adds Dispatch for mechanical event routing and command actuation; Phase 1 should route worker task_complete from codex_events."
      - "#114 adds worker-ack and manager-ack records."
      - "#115 adds categorized manager permissions and repeatable tool declarations."
      - "#116 adds named epilogue steps gated before finish-task."
      - "#117 adds dual independent what's-next proposals and a reviewer subagent diff."
      - "Preferred sequencing from implementation discussion: #115, #114, #113 Phase 1, #116 minimal, #117, then later #113 queue/watch phases."
      - "Later #113 queue/watch phases landed in the separate dispatch-command-queue-watch tranche; dashboard correlation-chain grouping remains split to that tranche's T007 follow-up note."
      - "Keep the role name dispatch."
      - "Do not route to human operators through Dispatch."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/dispatch-supervision-control-plane/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/dispatch-supervision-control-plane"

active_task: null

