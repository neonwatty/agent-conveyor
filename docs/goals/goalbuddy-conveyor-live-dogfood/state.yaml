version: 2

goal:
  title: "GoalBuddy Conveyor Live Dogfood"
  slug: goalbuddy-conveyor-live-dogfood
  kind: existing_plan
  tranche: "Live dogfood of the reusable GoalBuddy conveyor trigger."
  status: active
  oracle:
    signal: "Parent and child boards prove one satisfied-on-main child plus one PR/CI/merge child."
    cadence: "after each child is proven or merged"
    final_proof: "Parent receipt records child board paths, satisfied_on_main proof, PR URL, CI result, merge SHA, adversarial review, and final checker output."
  intake:
    original_request: "Begin the next slice: dogfood the new conveyor for real."
    interpreted_outcome: "Use the merged goalbuddy-conveyor QA contract to drive a fresh parent board with sequential child boards."
    input_shape: specific
    audience:
      - maintainers
      - GoalBuddy managers
      - workerctl operators
    authority: requested
    proof_type: test_review_ci_merge
    completion_proof: "One child is proven satisfied_on_main, the implementation child is merged green, and all boards pass GoalBuddy checks."
    likely_misfire: "The run could become another flat checklist or mark both children active/done without proof."
    blind_spots_considered:
      - "The first child is a no-op but still needs real source and command proof."
      - "The second child is small but still needs review, PR, CI, merge, and parent receipt."
      - "The board itself must reject multiple active children and missing final audit proof."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  conveyor:
    work_one_child_at_a_time: true
    child_completion_requires:
      - focused_verification
      - adversarial_review
      - pr_creation_or_satisfied_on_main
      - ci_monitoring_or_satisfied_on_main
      - merge_or_satisfied_on_main
      - parent_receipt_update
    if_already_satisfied_on_main: "prove with code evidence and focused tests, then mark satisfied_on_main"
    if_ci_fails: "inspect logs, fix, push, and re-monitor"

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: not_started
    url: "http://goalbuddy.localhost:41737/goalbuddy-conveyor-live-dogfood/"
    command: "npx goalbuddy board docs/goals/goalbuddy-conveyor-live-dogfood"

active_task: T002

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: low
    objective: "Prove the reusable conveyor command and docs are already satisfied on main."
    child_board: "docs/goals/goalbuddy-conveyor-live-dogfood/subgoals/satisfied-main-proof/goal.md"
    receipt:
      result: done
      satisfied_on_main: true
      summary: "The reusable conveyor start path is already present on main from PR #183 and receipt PR #184."
      correlation_id: "conveyor-satisfied-on-main"
      source_evidence:
        - "workerctl/cli.py includes `goalbuddy-conveyor` in qa-plan choices."
        - "workerctl/commands.py emits the goalbuddy-conveyor starter prompt, authority boundaries, acceptance criteria, correlation markers, and negative QA checks."
        - "docs/qa/goalbuddy-conveyor.md documents the canonical natural-language trigger."
        - "skills/manage-codex-workers/SKILL.md maps autonomous GoalBuddy conveyor language to `scripts/workerctl qa-plan goalbuddy-conveyor`."
      commands:
        - cmd: "scripts/workerctl qa-plan goalbuddy-conveyor --json | python3 -m json.tool >/tmp/goalbuddy-conveyor-dogfood.json"
          status: pass
        - cmd: "rg 'goalbuddy-conveyor|autonomous GoalBuddy conveyor|conveyor-satisfied-on-main' workerctl/cli.py workerctl/commands.py docs/qa/goalbuddy-conveyor.md skills/manage-codex-workers/SKILL.md"
          status: pass
      adversarial_review:
        strongest_failure_mode: "The first child could be marked done just because the previous PR existed, without source proof that the reusable command still exists on current main."
        proof: "The receipt pins current source locations plus the qa-plan JSON command and rg proof command."
      parent_handoff:
        activated_next_child: T002
        activated_at: "2026-06-01T14:08:12Z"

