      summary: "Implemented real Dispatch execution for notify_manager and nudge_worker command rows. dispatch --once now claims eligible commands, validates payload.message/payload.text before tmux, resolves the active session binding mechanically, writes a routed_notifications row linked by command_id/correlation_id, sends the text to the manager or worker session, and finishes command_attempts with succeeded/failed plus conservative side_effect_started/side_effect_completed flags."
      changed_files:
        - "workerctl/commands.py"
        - "workerctl/tmux.py"
        - "tests/test_workerctl.py"
        - "docs/goals/dispatch-command-queue-watch/state.yaml"
