      - "Missing evidence."
      - "Next task if not complete."
    receipt:
      result: complete
      full_outcome_complete: true
      dashboard_deferred_follow_up: true
      summary: "Final audit accepts the Dispatch command queue/watch tranche as complete for this GoalBuddy run. Core #113 Phase 2+ behavior is implemented and verified: additive command queue schema, atomic command claiming, durable command_attempts, notify_manager/nudge_worker execution through Dispatch, invalid-payload no-side-effect failure, conservative tmux side-effect audit, stale claim recovery without blind retries, dispatch --watch with interval/limit/type and heartbeat telemetry, replay/audit routed notifications, and correlation-chain visibility. Dashboard UI grouping is explicitly split to a follow-up note because of pre-existing unowned dashboard/client/styles.css dirtiness."
      requirement_evidence:
        - "Atomic claim safety: claim_next_dispatch_command uses guarded UPDATE ... RETURNING and DispatchTests cover no double-claim behavior."
        - "Durable attempts: command_attempts schema, finish helpers, task_audit, replay, and tests cover running/succeeded/failed/abandoned attempt state."
        - "notify_manager/nudge_worker execution: _execute_dispatch_command validates payloads, resolves active session binding, writes routed_notifications, sends via tmux, and finishes attempts."
        - "Invalid payload safety: DispatchTests prove invalid nudge_worker payload fails before send_text_to_session is called."
        - "Tmux side-effect audit: send_text_to_session supports side_effect_audit and execution marks side_effect_started before send; stale recovery refuses blind retry when true."
        - "Stale claim recovery: recover_stale_dispatch_claims requeues no-side-effect stale claims and fails side-effect-started stale claims for manual review."
        - "Watch mode: dispatch --watch supports --interval, --limit, --type, KeyboardInterrupt shutdown, bounded test iterations, and dispatch_watch_heartbeat telemetry."
        - "Replay/correlation visibility: task_audit returns routed_notifications and correlation_chains; replay renders command_attempts, routed_notifications, and correlation_chains."
        - "Dispatch remains mechanical: implementation only claims commands, validates payloads, sends text to bound sessions, records telemetry/audit rows, and does not insert manager decisions or update task completion state."
        - "Dashboard follow-up: notes/T007-dashboard-follow-up.md records deferred dashboard observation grouping and the dirty CSS reason."
      verification:
        - "python3 -m unittest tests.test_workerctl -v passed: 413 tests."
        - "python3 -m py_compile workerctl/*.py passed."
      residual_follow_up:
