      - "python3 -m py_compile workerctl/*.py"
    stop_if:
      - "Cannot distinguish stale attempts with recorded side_effect_started from no-side-effect stale attempts."
      - "Recovery would retry a command after side_effect_started is true."
      - "Need files outside allowed_files."
      - "Verification fails twice with unrelated failures."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "Implemented stale Dispatch claim recovery. dispatch now recovers expired attempted commands before claiming new work: attempts with no recorded side_effect_started are abandoned and requeued when max_attempts allows, while attempts with side_effect_started are failed for manual review and never retried blindly. Dispatch execution marks side_effect_started before tmux send begins so a crashed dispatcher leaves conservative retry evidence."
      changed_files:
        - "workerctl/db.py"
        - "workerctl/commands.py"
        - "tests/test_workerctl.py"
        - "docs/goals/dispatch-command-queue-watch/state.yaml"
      evidence:
        - "recover_stale_dispatch_claims requeues stale claims only when side_effect_started is false and attempts < max_attempts."
        - "recover_stale_dispatch_claims fails stale claims for manual review when side_effect_started is true."
        - "_execute_dispatch_command calls mark_command_attempt_side_effect_started before invoking tmux send."
        - "DispatchTests cover stale no-side-effect requeue and stale side-effect-started no-retry behavior."
      verify:
        - "python3 -m unittest tests.test_workerctl.DispatchTests -v"
        - "python3 -m unittest tests.test_workerctl -v"
        - "python3 -m py_compile workerctl/*.py"

