  - id: T009
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Implement stale Dispatch claim recovery without blind retries after possible tmux side effects."
    allowed_files:
      - "workerctl/db.py"
      - "workerctl/commands.py"
      - "tests/test_workerctl.py"
      - "docs/goals/dispatch-command-queue-watch/state.yaml"
