        - "claim_next_dispatch_command uses a single UPDATE ... RETURNING statement guarded by state='pending' and attempts < max_attempts."
        - "finish_command_attempt records succeeded/failed/abandoned attempts with side_effect_started and side_effect_completed booleans."
