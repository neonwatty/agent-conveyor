# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Dispatch Command Queue Watch"
  slug: "dispatch-command-queue-watch"
  kind: existing_plan
  tranche: "Implement #113 Phase 2+ command queue/watch behavior after PR #118 landed Dispatch Phase 1 and the supervision-control foundations."
  status: complete
  oracle:
    signal: "Focused tests plus final audit prove Dispatch can atomically claim and execute queued notify/nudge commands in once/watch modes with durable attempts, correlation_id replay visibility, and no judgment behavior."
    cadence: "after each Worker package and at final audit"
    final_proof: "A final audit maps deferred #113 acceptance criteria to schema helpers, CLI behavior, replay/dashboard visibility, and passing verification."
  intake:
    original_request: "plan it out with $goalbuddy:goal-prep"
    interpreted_outcome: "Prepare a GoalBuddy execution board for the deferred #113 Dispatch command queue/watch tranche."
    input_shape: existing_plan
    audience: "workerctl operators, managers, workers, Dispatch, and dashboard users"
    authority: requested
    proof_type: test
    completion_proof: "Dispatch queue/watch phases are implemented or explicitly split with receipts, tests pass, and final audit confirms safety boundaries."
    likely_misfire: "Shipping a polling loop or tmux send path without atomic claim safety, durable attempts, invalid-payload no-side-effect guarantees, or correlation-chain visibility."
    blind_spots_considered:
      - "Tmux sends are not naturally idempotent; retry behavior must be conservative."
      - "Two dispatchers must not execute the same command."
      - "Watch mode can hide lifecycle bugs unless one-shot command execution is stable first."
      - "Dashboard grouping should follow DB/replay semantics, not invent separate truth."
      - "Dispatch must remain mechanical and must not decide completion or notify human operators."
      - "An unrelated dirty file exists at dashboard/client/styles.css and should be resolved or avoided before dashboard work."
    existing_plan_facts:
      - "PR #118 merged Dispatch Phase 1 completion routing and the #114-#117 foundations."
      - "The follow-up note is docs/goals/dispatch-supervision-control-plane/notes/T998-dispatch-follow-up.md."
      - "Deferred #113 criteria include command row processing, atomic command claiming, command attempts, dispatch --watch, invalid payload handling, stale claim recovery, replay correlation chains, and dashboard observation grouping."
      - "Start with schema/claiming and fake/no-side-effect executor tests before tmux side effects."
      - "Keep direct nudge/session commands available during migration."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  preserve_and_validate_existing_plan: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/dispatch-command-queue-watch/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/dispatch-command-queue-watch"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: low
    objective: "Map the current merged command/dispatch surfaces and identify the exact schema helpers, CLI handlers, tests, replay, telemetry, and dashboard files needed for #113 Phase 2+."
    inputs:
      - "Merged PR #118 state"
      - "docs/goals/dispatch-supervision-control-plane/notes/T998-dispatch-follow-up.md"
      - "GitHub issue #113 acceptance criteria"
      - "workerctl command lifecycle, dispatch, replay, telemetry, lifecycle, tmux, and dashboard observation surfaces"
      - "tests/test_workerctl.py"
    constraints:
      - "Read-only."
      - "Do not edit implementation files."
      - "Do not touch dashboard/client/styles.css; it is pre-existing unrelated dirty work."
      - "Prefer exact file/function/test evidence."
    expected_output:
      - "Surface map for command claiming, attempt recording, dispatch execution, replay, telemetry, and dashboard visibility."
      - "Compatibility risks with existing direct commands."
      - "Recommended first Worker package with allowed_files, verify commands, and stop_if conditions."
    receipt:
      result: done
      note: "notes/T001-scout-map.md"
      summary: "Mapped the merged command/dispatch surfaces. Current commands lack correlation_id, claim/lease fields, command_attempts, stale-claim helpers, and dispatch command processing. Dispatch only routes worker task_complete signals and rejects --watch. Recommended first Worker package is additive queue foundations plus no-side-effect command claiming."
      evidence:
        - "workerctl/db.py: commands schema, create_command, mark_command_attempted, finish_command, routed_notifications, task_audit"
        - "workerctl/commands.py: command_dispatch only handles completion signals and rejects --watch"
        - "workerctl/cli.py: dispatch flags exist but no interval/watch implementation"
        - "workerctl/replay.py: commands render, command_attempts absent"
        - "workerctl/tmux.py: send_text_to_session side effects are non-idempotent once paste begins"
        - "dashboard/server/index.ts and dashboard/server/workerctl.ts: observation timeline currently comes from telemetry snapshot/discover, no dispatch command surface"
        - "tests/test_workerctl.py: DispatchTests, command lifecycle tests, commands CLI tests, session tmux tests, mutation audit tests"
      spawned_tasks:
        - T002

  - id: T002
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Validate the Scout map and choose the largest safe first Worker slice for #113 Phase 2+."
    inputs:
      - "T001 receipt"
      - "Goal charter constraints"
      - "#113 deferred acceptance criteria"
    constraints:
      - "Read-only."
      - "Do not implement."
      - "Prefer proving atomic claim semantics before tmux side effects."
      - "Reject any slice that lets Dispatch make task success or next-action decisions."
    expected_output:
      - "approved | split | defer"
      - "Exact first Worker objective."
      - "allowed_files."
      - "verify commands."
      - "stop_if conditions."
      - "Deferred tasks or risk notes."
    receipt:
      result: done
      decision: "approved"
      full_outcome_complete: false
      rationale: "The first safe useful slice is additive command queue foundations plus a no-side-effect dispatch command-claim path. This proves the highest-risk invariant, atomic claim safety, before introducing tmux sends or watch loops. It preserves existing direct command lifecycle behavior by adding nullable columns/table and new helpers instead of changing existing command states."
      worker_objective: "Implement #113 Phase 2 queue foundations: commands.correlation_id and additive lease metadata, command_attempts, atomic claim helper, attempt start/finish helpers, task_audit/replay visibility, and dispatch --once command claiming in dry-run/no-side-effect mode for explicit command rows."
      allowed_files:
        - "workerctl/db.py"
        - "workerctl/commands.py"
        - "workerctl/cli.py"
        - "workerctl/replay.py"
        - "tests/test_workerctl.py"
        - "docs/goals/dispatch-command-queue-watch/state.yaml"
      verify:
        - "python3 -m unittest tests.test_workerctl -v"
        - "python3 -m py_compile workerctl/*.py"
      stop_if:
        - "Atomic claim semantics cannot be implemented additively."
        - "Existing direct command lifecycle tests require destructive state changes."
        - "Tmux side effects are needed before claim/attempt tests pass."
        - "Need files outside allowed_files."
        - "Verification fails twice with unrelated failures."
      deferred:
