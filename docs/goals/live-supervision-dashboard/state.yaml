      - "Read-only."
      - "Do not implement."
      - "Identify stable JSON commands the dashboard can shell out to and missing commands/options."
    expected_output:
      - "Dashboard data-source map."
      - "Missing CLI JSON contracts."
      - "Verification commands."
      - "Risks and recommended first implementation slice."
    receipt:
      result: done
