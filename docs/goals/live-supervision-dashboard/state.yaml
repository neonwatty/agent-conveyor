# GoalBuddy v2 state.yaml

version: 2

goal:
  title: "Live Supervision Dashboard"
  slug: "live-supervision-dashboard"
  kind: existing_plan
  tranche: "Build the first usable local workerctl dashboard cockpit for attach-first manager/worker supervision."
  status: done
  oracle:
    signal: "A local dashboard walkthrough demonstrates one selected worker/manager task with interactive terminals, attach/bind setup, telemetry snapshot overview, criteria/telemetry/replay diagnostics, audited action receipts, finish/export, and clean reconcile output."
    cadence: "after each Worker package and at final audit"
    final_proof: "Dashboard walkthrough receipt plus tests for snapshot CLI, dashboard command orchestration, terminal attach behavior, and cleanup/reconcile checks."
  intake:
    original_request: "Think out and organize a serious debugging dashboard for worker/manager supervision."
    interpreted_outcome: "A local-first workerctl dashboard cockpit exists and is useful for live supervision and debugging."
    input_shape: existing_plan
    audience: "repo owner/operator supervising Codex worker and manager sessions"
    authority: approved
    proof_type: demo
    completion_proof: "Launchable dashboard demo with a real or disposable worker/manager task, verified actions, telemetry visibility, export evidence, and clean cleanup."
    likely_misfire: "Building a web terminal wrapper that does not improve supervision, telemetry review, or auditability."
    blind_spots_considered:
      - "Terminal security and loopback-only binding."
      - "Raw transcript/log amplification."
      - "PTY lifecycle and tmux attach/detach behavior."
      - "Stable JSON contracts for dashboard state."
      - "Avoiding duplicated control-plane logic in TypeScript."
      - "Manager sessions may not always be tmux-backed."
      - "Dashboard dependency installation and doctor checks."
    existing_plan_facts:
      - "Live supervision cockpit is the primary screen."
      - "Attach-first workflow is the default."
      - "Single-task focused cockpit."
      - "Fully interactive worker and manager terminals side by side."
      - "Use xterm.js plus TypeScript WebSocket PTY bridge."
      - "Implement inside this repo as workerctl dashboard."
      - "Use TypeScript frontend and TypeScript backend."
      - "TypeScript backend shells out to stable workerctl JSON commands for v1."
      - "Terminals attach to existing tmux sessions via node-pty running tmux attach."
      - "Desktop layout: worker terminal, manager terminal, diagnostics rail."
      - "Overview rail depends on workerctl telemetry snapshot --json --task <task>."
      - "V1 includes attach/bind setup and action controls for cycle, nudge, interrupt, finish, and export."
      - "Dashboard shows copy-paste registration prompts; it does not register the browser as the current Codex session."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  slice_policy:
    max_consecutive_tiny_tasks: 2
    prefer_vertical_slices: true
    judge_picks_largest_safe_slice: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/live-supervision-dashboard/"
    command: "npx goalbuddy board /Users/neonwatty/Desktop/codex-terminal-manager/docs/goals/live-supervision-dashboard --host goalbuddy.localhost --port 41737"

active_task: null

