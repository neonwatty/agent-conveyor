# GoalBuddy v2 state.yaml
# Board truth lives here. goal.md is the editable charter; notes/ holds long receipts only.

version: 2

goal:
  title: "Agent Conveyor v0.1.1 Hardening"
  slug: "agent-conveyor-v0.1.1-hardening"
  kind: existing_plan
  tranche: "Post-release hardening after the npm 0.1.0 TypeScript shipment."
  status: complete
  oracle:
    signal: "Trusted Publishing readiness is proven or precisely blocked, public-package real workflow smoke passes, renamed local clone exists, generated artifacts are cleaned without losing user work, and v0.1.1 polish work is scoped with verification."
    cadence: "after each hardening task and before any PR/merge or release decision"
    final_proof: "Receipts include workflow/docs/test diffs, npm trust configuration evidence or auth blocker, public-package disposable flow output, local clone/cleanup evidence, and final full_outcome_complete truth."
  intake:
    original_request: "Do all next post-release hardening tasks after publishing agent-conveyor."
    interpreted_outcome: "Make the release path calmer for future versions, clean local rename fallout, prove a real public-package workflow, and queue v0.1.1 polish."
    input_shape: existing_plan
    audience: "Agent Conveyor maintainers and future release operators"
    authority: approved
    proof_type: artifact
    completion_proof: "Workflow/docs/tests and local environment evidence prove the post-release hardening checklist is handled, with any npm-side auth limitation recorded as a precise blocker."
    likely_misfire: "Add a publish workflow that can accidentally republish or delete local worktrees/dirty docs while trying to clean up."
    blind_spots_considered:
      - "npm Trusted Publishing has both repo-side workflow requirements and npm-side package trust configuration."
      - "The local root checkout still has unrelated dirty/untracked docs that must be preserved."
      - "The existing `v0.1.0` tag belongs to the PyPI release and must not be rewritten."
      - "A public install `--help` check is weaker than a real disposable binding flow."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  preserve_and_validate_existing_plan: true
  no_completion_on_weak_proof: true
  no_automatic_publish: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: live
    url: "http://goalbuddy.localhost:41737/agent-conveyor-v0-1-1-hardening/"
    command: "npx goalbuddy board /Users/neonwatty/.config/superpowers/worktrees/codex-terminal-manager/agent-conveyor-ts-final-audit/docs/goals/agent-conveyor-v0.1.1-hardening"

active_task: null

tasks:
  - id: T001
    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Map the current post-release hardening state and identify the remaining bounded v0.1.1 tasks."
    inputs:
      - "npm Trusted Publishing docs"
      - ".github/workflows/publish.yml"
      - "docs/package-release.md"
      - "Current local clone/worktree status"
      - "Public npm package smoke evidence"
    constraints:
      - "Read-only unless updating this board receipt."
      - "Do not publish."
      - "Do not delete worktrees or branches."
    expected_output:
      - "Trusted Publishing configured | repo_ready_npm_auth_blocked | not_ready"
      - "Local clone and cleanup evidence"
      - "Public package smoke evidence"
      - "Proposed v0.1.1 task queue"
    receipt:
      result: done
      decision: repo_ready_npm_auth_blocked
      full_outcome_complete: false
      summary: "Post-release hardening state is mapped. Repo-side Trusted Publishing workflow support is implemented locally, GitHub `npm-production` environment exists with `neonwatty` as required reviewer, public-package disposable smoke passed, fresh `/Users/neonwatty/Desktop/agent-conveyor` clone exists, and root generated `dist/` was cleaned without touching unrelated dirty docs."
      evidence:
        - "npm trust dry-run output for the intended GitHub Actions trusted publisher config."
        - "GitHub environment API output for `npm-production` with required reviewer `neonwatty`."
        - "Public package disposable binding smoke output."
        - "Fresh clone and root cleanup git status output."
      trusted_publishing:
        status: "repo_ready_npm_auth_blocked"
        desired_config:
          package: "agent-conveyor"
          provider: "GitHub Actions"
          repository: "neonwatty/agent-conveyor"
          workflow_file: "publish.yml"
          environment: "npm-production"
          allowed_action: "npm publish"
        blocker: "`npx npm@11 trust github ...` returned E401 because local npm auth was revoked after the 0.1.0 release. npm trust commands do not support bypass-2FA granular access tokens."
      commands:
        - cmd: "npx npm@11 trust github agent-conveyor --repo neonwatty/agent-conveyor --file publish.yml --env npm-production --allow-publish --dry-run --json"
          status: pass
          summary: "Dry-run produced the intended trusted publisher config."
        - cmd: "npx npm@11 trust github agent-conveyor --repo neonwatty/agent-conveyor --file publish.yml --env npm-production --allow-publish --yes --json"
          status: fail
          summary: "Registry returned E401 due missing supported npm login after temporary token revocation."
        - cmd: "gh api repos/neonwatty/agent-conveyor/environments/npm-production"
          status: pass
          summary: "`npm-production` exists and has required reviewer `neonwatty`."
        - cmd: "npm install agent-conveyor@0.1.0 && conveyor create-disposable-binding ... && conveyor worker-inbox ... && conveyor loop-status ..."
          status: pass
          summary: "Public package created a no-tmux task, worker, manager, Ralph-loop run, and returned loop policy requiring `adversarial_check`."
        - cmd: "git clone git@github.com:neonwatty/agent-conveyor.git /Users/neonwatty/Desktop/agent-conveyor"
          status: pass
          summary: "Fresh local clone exists at the renamed repo path."
        - cmd: "rm -rf /Users/neonwatty/Desktop/codex-terminal-manager/dist"
          status: pass
          summary: "Removed only the generated root `dist/` artifact; unrelated dirty docs/boards were preserved."

  - id: T002
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: medium
    objective: "Finish repo-side Trusted Publishing support and release docs/tests."
    allowed_files:
      - ".github/workflows/publish.yml"
      - "docs/package-release.md"
      - "tests/test_workerctl.py"
      - "docs/goals/agent-conveyor-v0.1.1-hardening/**"
    verify:
      - "ruby -e 'require \"yaml\"; YAML.load_file(\".github/workflows/publish.yml\")'"
      - "python3 -m unittest tests.test_workerctl.CliTests.test_publish_workflow_verifies_npm_tarball_without_publishing tests.test_workerctl.CliTests.test_package_release_metadata_and_checklist_are_documented -v"
      - "git diff --check"
    stop_if:
      - "Workflow would publish without explicit manual input and version checks."
      - "npm-side trusted publisher setup requires interactive auth."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "Repo-side Trusted Publishing support is implemented locally: the manual package workflow now verifies a versioned tarball by default and has a guarded `publish=true` job that downloads the verified artifact, checks the version is not already published, requires the `npm-production` environment, grants OIDC `id-token: write`, runs the prepublish guard, and publishes the exact tarball. Release docs and release-contract tests were updated."
      changed_files:
        - ".github/workflows/publish.yml"
        - "docs/package-release.md"
        - "tests/test_workerctl.py"
      commands:
        - cmd: "python3 -m unittest tests.test_workerctl.CliTests.test_publish_workflow_verifies_npm_tarball_without_publishing tests.test_workerctl.CliTests.test_package_release_metadata_and_checklist_are_documented -v"
          status: pass
          summary: "Focused release workflow/docs tests passed."
        - cmd: "ruby -e 'require \"yaml\"; YAML.load_file(\".github/workflows/publish.yml\")'"
          status: pass
          summary: "Workflow YAML parsed."
        - cmd: "git diff --check"
          status: pass
          summary: "No whitespace errors."
      disproof:
        strongest_failure_mode: "The workflow could accidentally publish an already-used version or bypass the prepublish guard."
        evidence: "The publish job is manual-only via workflow input, checks `package.json` version against the requested version, refuses versions already visible via `npm view`, runs inside `npm-production`, calls `node scripts/prepublish-guard.mjs`, and publishes only the downloaded verified tarball."

  - id: T003
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "Record and verify local rename cleanup."
    allowed_files:
      - "docs/goals/agent-conveyor-v0.1.1-hardening/**"
    verify:
      - "test -d /Users/neonwatty/Desktop/agent-conveyor/.git"
      - "git -C /Users/neonwatty/Desktop/agent-conveyor status -sb"
      - "git -C /Users/neonwatty/Desktop/codex-terminal-manager status -sb"
    stop_if:
      - "A cleanup target is tracked, unmerged, or unrelated user work."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "Local rename cleanup is complete within safe bounds. A fresh clone exists at `/Users/neonwatty/Desktop/agent-conveyor` on `main`, the old root checkout still exists with user/untracked docs preserved, and the generated untracked root `dist/` artifact was removed."
      changed_files:
        - "docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml"
      commands:
        - cmd: "test -d /Users/neonwatty/Desktop/agent-conveyor/.git && git -C /Users/neonwatty/Desktop/agent-conveyor status -sb"
          status: pass
          summary: "Fresh renamed clone is present and clean on `main...origin/main`."
        - cmd: "git -C /Users/neonwatty/Desktop/codex-terminal-manager status -sb"
          status: pass
          summary: "Root checkout still has pre-existing dirty `state.yaml` and untracked docs/boards, but no generated `dist/`."
        - cmd: "git for-each-ref ... merge-base --is-ancestor ... origin/main"
          status: pass
          summary: "Identified merged and unmerged local branches; no unmerged worktrees were deleted."
      observations:
        - type: "preserved-user-work"
          detail: "Old root folder was not renamed because it contains unrelated dirty/untracked work and is the active workspace for this thread."

  - id: T004
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: medium
    objective: "Decide the v0.1.1 scope for Node SQLite warning handling and docs polish."
    inputs:
      - "Public package smoke output"
      - "Release docs"
      - "Node SQLite warning occurrences"
    constraints:
      - "Read-only."
      - "Prefer bounded polish over risky warning suppression."
    expected_output:
      - "v0.1.1 recommended scope"
      - "Warnings to fix, document, or defer"
      - "Verification commands for each follow-up"
    receipt:
      result: done
      full_outcome_complete: false
      decision: "Document expected Node `node:sqlite` ExperimentalWarning behavior for v0.1.1; do not suppress warnings in runtime code."
      summary: "The SQLite warning is real on Node v22.22.3 and appears on stderr even when `conveyor db-doctor --json` succeeds. Because suppressing `ExperimentalWarning` globally could hide unrelated runtime warnings, the bounded v0.1.1 scope is docs polish plus release-receipt expectations rather than runtime suppression."
      evidence:
        - "`node -e \"require('node:sqlite'); console.log('loaded')\" 2>&1` printed `loaded` followed by Node's SQLite `ExperimentalWarning`."
        - "Installed `agent-conveyor@0.1.0` `conveyor db-doctor --json` exited 0, returned JSON with `ok: true`, and printed the same SQLite `ExperimentalWarning` on stderr."
      recommended_scope:
        fix_now:
          - "Document that the warning is expected when command exit is 0 and JSON health is `ok: true`."
          - "Record first-run stderr expectations in package-release receipts."
        defer:
          - "Runtime suppression of Node experimental warnings."
          - "Database driver replacement while Node's built-in SQLite API is still otherwise passing package and workflow gates."
      verification:
        - "npm run check"
        - "scripts/release-check"
        - "Installed package `conveyor db-doctor --json` smoke with stderr captured."

  - id: T005
    type: worker
    assignee: Worker
    status: done
    reasoning_hint: low
    objective: "Apply v0.1.1 docs polish for SQLite first-run warning and release workflow dry-run expectations."
    allowed_files:
      - "README.md"
      - "docs/package-release.md"
      - "docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml"
    verify:
      - "git diff --check"
      - "npm run check"
      - "scripts/release-check"
    stop_if:
      - "Docs imply the warning can be ignored when command exit is nonzero or JSON health is not ok."
      - "Docs imply `0.1.1` can be published without bumping `package.json` first."
    receipt:
      result: done
      full_outcome_complete: false
      summary: "README and release docs now explain that Node's `node:sqlite` ExperimentalWarning can appear on successful SQLite commands, and package release docs clarify that workflow dry runs before a version bump should use the current `package.json` version with `publish=false`."
      changed_files:
        - "README.md"
        - "docs/package-release.md"
        - "docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml"
      commands:
        - cmd: "gh workflow run publish.yml --repo neonwatty/agent-conveyor --ref main -f version=0.1.0 -f publish=false && gh run watch 27073942634 --repo neonwatty/agent-conveyor --exit-status"
          status: pass
          summary: "Package Verification dry run passed; verify job ran tests, package smoke, release check, tarball pack/upload; publish job was skipped."
        - cmd: "node -v && node -e \"require('node:sqlite'); console.log('loaded')\" 2>&1"
          status: pass
          summary: "Node v22.22.3 loaded SQLite and printed the expected ExperimentalWarning."
        - cmd: "npm install -g --prefix <tmp>/prefix agent-conveyor@0.1.0 && PATH=<tmp>/prefix/bin:$PATH conveyor db-doctor --path <tmp>/workerctl.db --json"
          status: pass
          summary: "Installed package db-doctor exited 0 with `ok: true` JSON and printed the expected SQLite ExperimentalWarning on stderr."

  - id: T999
    type: judge
    assignee: Judge
    status: done
    reasoning_hint: high
    objective: "Final audit the post-release hardening board against the oracle."
    inputs:
      - "All hardening receipts"
      - "PR and CI status if repo changes were opened"
      - "npm trust configuration evidence or blocker"
      - "Public package smoke evidence"
    constraints:
      - "Read-only."
      - "Do not claim Trusted Publishing is fully active unless npm trust list or npm package settings prove it."
    expected_output:
      - "complete | not_complete"
      - "full_outcome_complete: true | false"
      - "Exact blockers or next release tasks"
    receipt:
      result: complete
      full_outcome_complete: true
      summary: "Post-release hardening is complete. The npm package settings page proves Trusted Publishing is configured for `neonwatty/agent-conveyor` with `publish.yml`, `npm publish`, and `npm-production`; the GitHub workflow dry run proved verify/build/test/package/artifact behavior with `publish=false`; the public-package SQLite first-run warning was reproduced and documented; local full check and release artifact gates passed."
      oracle_mapping:
        trusted_publishing: "Proven in npm package settings UI: Trusted Publisher lists `neonwatty/agent-conveyor`, `publish.yml`, permission `npm publish`, and environment `npm-production`."
        github_release_path: "Run 27073942634 passed `Package Verification` on `main` with `version=0.1.0` and `publish=false`; verify job ran tests, package smoke, release check, pack, and tarball upload; publish job was skipped."
        public_package_smoke: "Earlier public package disposable binding smoke passed for `agent-conveyor@0.1.0`; T005 additionally reproduced installed-package `db-doctor --json` success with expected SQLite warning stderr."
        local_cleanup: "Fresh renamed clone remains at `/Users/neonwatty/Desktop/agent-conveyor`; generated `dist/` from local verification was removed after checks."
        v0_1_1_scope: "Recommended v0.1.1 scope is docs/release polish unless the operator wants a version bump and publish run. Do not suppress Node experimental warnings globally."
      commands:
        - cmd: "gh workflow run publish.yml --repo neonwatty/agent-conveyor --ref main -f version=0.1.0 -f publish=false; gh run watch 27073942634 --repo neonwatty/agent-conveyor --exit-status"
          status: pass
          summary: "GitHub Actions package verification dry run passed; publish job skipped."
        - cmd: "gh run view 27073942634 --repo neonwatty/agent-conveyor --json databaseId,status,conclusion,createdAt,updatedAt,event,headBranch,headSha,url,jobs"
          status: pass
          summary: "Run conclusion success; verify job success; publish job skipped."
        - cmd: "node -v && node -e \"require('node:sqlite'); console.log('loaded')\" 2>&1"
          status: pass
          summary: "Node v22.22.3 reproduced the SQLite ExperimentalWarning."
        - cmd: "npm install -g --prefix <tmp>/prefix agent-conveyor@0.1.0 && PATH=<tmp>/prefix/bin:$PATH conveyor db-doctor --path <tmp>/workerctl.db --json"
          status: pass
          summary: "Installed package returned `ok: true` JSON and expected SQLite ExperimentalWarning stderr."
        - cmd: "npm ci"
          status: pass
          summary: "Installed local dependencies; npm reported 0 vulnerabilities."
        - cmd: "npm run check"
          status: pass
          summary: "Lint, knip, 159 tests, and build passed."
        - cmd: "scripts/release-check"
          status: pass
          summary: "Packed npm tarball, installed in a clean prefix, verified CLI help and bundled skills without publishing."
        - cmd: "git diff --check"
          status: pass
          summary: "No whitespace errors."
        - cmd: "ruby -e 'require \"yaml\"; YAML.load_file(\"docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml\")'"
          status: pass
          summary: "Board YAML parsed."
        - cmd: "npx goalbuddy check docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml"
          status: fail
          summary: "Local GoalBuddy CLI has no `check` subcommand; used YAML parse and repo gates instead."
      disproof:
        strongest_failure_mode: "The release workflow could look green locally while GitHub either fails the artifact path or accidentally reaches publish."
        evidence: "Workflow run 27073942634 passed the verify job on GitHub and the publish job was explicitly skipped with `publish=false`; local `scripts/release-check` independently packed and clean-installed the tarball without publishing."

checks:
  last_verification:
    result: pass
    task: "final audit"
    commands:
      - "gh run watch 27073942634 --repo neonwatty/agent-conveyor --exit-status"
      - "npm run check"
      - "scripts/release-check"
      - "git diff --check"
      - "ruby -e 'require \"yaml\"; YAML.load_file(\"docs/goals/agent-conveyor-v0.1.1-hardening/state.yaml\")'"
