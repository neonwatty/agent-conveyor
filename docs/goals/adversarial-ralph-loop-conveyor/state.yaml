version: 2

goal:
  title: "Adversarial Ralph Loop Conveyor"
  slug: adversarial-ralph-loop-conveyor
  kind: existing_plan
  tranche: "Sequential vertical-slice child boards for Ralph-loop adversarial trigger and conveyor reliability work."
  status: done
  oracle:
    signal: "Every child board has a PR/CI/merge receipt, satisfied-on-main proof, or explicit blocker evidence."
    cadence: "after each child PR reaches green/merge or blocker"
    final_proof: "Parent tasks record each child board path, PR URL, CI result, merge SHA, verification commands, and adversarial review receipt."
  intake:
    original_request: "Create an autonomous GoalBuddy conveyor for this project."
    interpreted_outcome: "Drive Ralph-loop adversarial trigger work as one vertical slice at a time, with GoalBuddy receipts and PR lifecycle proof for each child."
    input_shape: existing_plan
    audience:
      - maintainers
      - workerctl operators
      - GoalBuddy managers
      - Ralph-loop QA users
    authority: requested
    proof_type: test_review_ci_merge
    completion_proof: "All queued children are merged, proven satisfied on main, or blocked with evidence."
    likely_misfire: "Planning multiple boards but not actually running the first slice through review, CI, merge, and receipt update."
    blind_spots_considered:
      - "A child can be docs-only but still needs CI and merge proof."
      - "Natural-language behavior can look documented but fail in live manager usage."
      - "A queued child may already be satisfied by a recent merge and should be proven, not reimplemented."

rules:
  pm_owns_state: true
  one_active_task: true
  max_write_workers: 1
  no_implementation_without_worker_or_pm_task: true
  no_completion_without_judge_or_pm_audit: true
  planning_is_not_completion: true
  queued_required_worker_blocks_completion: true
  continuous_until_full_outcome: true
  missing_input_or_credentials_do_not_stop_goal: true
  preserve_and_validate_existing_plan: true
  intake_misfire_must_be_audited: true
  goal_pressure_requires_oracle: true
  no_completion_on_weak_proof: true
  conveyor:
    work_one_child_at_a_time: true
    child_completion_requires:
      - implementation
      - focused_verification
      - adversarial_review
      - pr_creation
      - ci_monitoring
      - merge
      - parent_receipt_update
    if_already_satisfied_on_main: "prove with code evidence and focused tests, then mark satisfied_on_main"
    if_ci_fails: "inspect logs, fix, push, and re-monitor"
  slice_policy:
    prefer_vertical_slices: true
    worker_completes_whole_slice: true

agents:
  scout: installed
  worker: installed
  judge: installed

visual_board:
  selected: local
  local:
    status: not_started
    url: "http://goalbuddy.localhost:41737/adversarial-ralph-loop-conveyor/"
    command: "npx goalbuddy board docs/goals/adversarial-ralph-loop-conveyor"

active_task: null

tasks:
  - id: T001
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Complete child board adversarial-trigger-qa-plan through PR review, CI, merge, and parent receipt update."
    child_board: "docs/goals/adversarial-ralph-loop-conveyor/subgoals/adversarial-trigger-qa-plan/goal.md"
    branch: "codex/adversarial-gate-natural-language"
    pr_url: "https://github.com/neonwatty/codex-terminal-manager/pull/179"
    constraints:
      - "Do not mark complete until PR #179 has green CI and is merged."
      - "If CI fails, inspect logs, fix, push, and re-monitor."
      - "Record merge SHA and verification receipts before activating C002."
    expected_output:
      - "PR #179 merged."
      - "CI result recorded."
      - "Merge SHA recorded."
      - "Child board marked done."
      - "Parent receipt updated."
    receipt:
      result: done
      summary: "First child completed: PR #179 merged with green CI, final branch review clean, and merge proof recorded."
      pr_url: "https://github.com/neonwatty/codex-terminal-manager/pull/179"
      ci_result: "green"
      merge_sha: "37c3a16f9380b49730bf8f68a0c0c4067262530f"
      merged_at: "2026-06-01T00:42:50Z"
      evidence:
        - "Local focused qa_plan tests passed."
        - "GoalBuddy checker passed for parent and all child boards."
        - "codex-review --mode branch completed clean with no accepted/actionable findings."
        - "Mechanical smoke passed: Dispatch blocked missing adversarial proof, fresh retry became pull_required, and finish gate failed closed then succeeded."
        - "GitHub checks `unittest` passed for push and pull_request runs before merge."
        - "PR #179 merged as 37c3a16f9380b49730bf8f68a0c0c4067262530f."

  - id: T002
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Run the adversarial-trigger QA plan live against disposable manager/worker tasks and record evidence."
    child_board: "docs/goals/adversarial-ralph-loop-conveyor/subgoals/adversarial-trigger-live-run/goal.md"
    activation_rule: "Activate only after T001 is merged or proven satisfied on main."
    receipt:
      result: done
      summary: "Disposable live QA passed for all five adversarial trigger families; one follow-up finding moves to the prompt-contract child."
      artifact: "docs/live-qa-artifacts/2026-06-01-adversarial-trigger-live-run/summary.md"
      live_result: pass
      evidence:
        - "Loop policy run exposed metadata.required_before_continue=[adversarial_check]."
        - "Dispatch blocked missing adversarial proof before worker delivery and left worker inbox empty."
        - "Post-proof fresh retry delivered through the no-tmux mailbox path with state=pull_required."
        - "Finish gate failed closed before proof and succeeded after structured proof on an unbound disposable task."
        - "Worker-directed proof persisted source=worker_proposed adversarial_check evidence."
        - "Manager-created adversarial criterion was satisfied with structured negative-check evidence."
      follow_up:
        - "Bound no-tmux manager finish-task path still fails identity verification with tmux_session_missing."

  - id: T003
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Tighten manager prompt examples for adversarial acceptance criteria from manager to worker if live QA shows any ambiguity."
    child_board: "docs/goals/adversarial-ralph-loop-conveyor/subgoals/ralph-loop-manager-prompt-contract/goal.md"
    activation_rule: "Activate after T002 has a pass/fail receipt."
    receipt:
      result: done
      summary: "Prompt-contract child completed: the real gap was bound no-tmux manager finish identity. PR #181 hardened pull-mode session identity, passed CI, and merged."
      pr_url: "https://github.com/neonwatty/codex-terminal-manager/pull/181"
      ci_result: "green"
      merge_sha: "0cb6c957f66b0ca1277fbec1e210d2d53e3fdaab"
      merged_at: "2026-06-01T02:26:21Z"
      evidence:
        - "No-tmux manager finish gate now requires active session state, codex_session_id/path metadata, readable rollout session_meta, positive live PID, and PID-to-rollout match."
        - "Focused finish-task and no-tmux identity tests passed locally."
        - "GoalBuddy checker passed for parent and prompt-contract child."
        - "codex-review toolkit completed clean with no accepted/actionable findings."
        - "GitHub checks `unittest` passed before merge."
        - "PR #181 merged as 0cb6c957f66b0ca1277fbec1e210d2d53e3fdaab."

  - id: T004
    type: pm
    assignee: PM
    status: done
    reasoning_hint: medium
    objective: "Create reusable conveyor automation or docs once live trigger behavior proves the prompt contract."
    child_board: "docs/goals/adversarial-ralph-loop-conveyor/subgoals/ralph-loop-conveyor-automation/goal.md"
    activation_rule: "Activate after T003 is merged, satisfied on main, or blocked."
    receipt:
      result: done
      activated_by_parent_task: T003
      activation_pr: "https://github.com/neonwatty/codex-terminal-manager/pull/181"
      activation_merge_sha: "0cb6c957f66b0ca1277fbec1e210d2d53e3fdaab"
      summary: "Final child completed: reusable GoalBuddy conveyor QA path merged in PR #183 with green CI, and parent conveyor is complete."
      pr_url: "https://github.com/neonwatty/codex-terminal-manager/pull/183"
      ci_result: "green"
      merge_sha: "bfa72a2c271cc9789fde299fe614f8da08e6739f"
      merged_at: "2026-06-01T12:21:55Z"
      decision: complete
      full_outcome_complete: true
      evidence:
        - "PR #183 added `workerctl qa-plan goalbuddy-conveyor`, README/docs/skill guidance, and JSON/text tests."
        - "GitHub checks `unittest` passed twice before merge."
        - "codex-review toolkit completed clean with no accepted/actionable findings."
        - "The strongest failure mode was checked: a broad conveyor request could become a flat checklist or multiple active child boards; the merged QA plan pins one-child-at-a-time authority, PR/CI/merge receipts, satisfied_on_main proof, and adversarial review gates."
        - "Child board docs/goals/adversarial-ralph-loop-conveyor/subgoals/ralph-loop-conveyor-automation/state.yaml records PR URL, CI result, merge SHA, and final PM audit."
