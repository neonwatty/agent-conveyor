    type: scout
    assignee: Scout
    status: done
    reasoning_hint: medium
    objective: "Compare live QA receipts against manager prompt examples and identify any prompt-contract gap."
    allowed_files:
      - "README.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "skills/manage-codex-workers/SKILL.md"
      - "workerctl/**"
      - "tests/**"
      - "docs/**"
    verify:
      - "Focused tests or evidence proving the prompt contract."
      - "Adversarial review of any prompt-contract change."
    receipt:
      result: done
      summary: "Live QA found the gap was not prompt wording: finish-task verified bound no-tmux managers through tmux identity and failed with tmux_session_missing."
      evidence:
        - "docs/live-qa-artifacts/2026-06-01-adversarial-trigger-live-run/summary.md"

