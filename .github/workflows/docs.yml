name: Docs

on:
  push:
    paths:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/landing-media-capture-plan.md"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/landing-media-capture-plan.md"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"
      - ".github/workflows/docs.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  landing-page:
    name: Landing page static check
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify landing page
        run: node scripts/check-landing-page.mjs
