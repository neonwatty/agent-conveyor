name: Package Verification

on:
  workflow_dispatch:

jobs:
  npm-package:
    name: Verify npm package artifact
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Run package smoke
        run: scripts/package-smoke

      - name: Run release check
        run: scripts/release-check

      - name: Create review tarball
        run: npm pack --json

      - name: Upload npm tarball
        uses: actions/upload-artifact@v6
        with:
          name: agent-conveyor-npm-tarball
          path: agent-conveyor-*.tgz
          if-no-files-found: error
