name: Tests

on:
  push:
    paths-ignore:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/landing-media-capture-plan.md"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/landing-media-capture-plan.md"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unittest:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Python version
        run: python3 --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run release-candidate deterministic checks
        run: scripts/rc-check --skip-live-smoke-repeat

      - name: Run package install smoke
        run: scripts/package-smoke
