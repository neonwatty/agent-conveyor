name: Tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Python version
        run: python3 --version

      - name: Run release-candidate deterministic checks
        run: scripts/rc-check --skip-live-smoke-repeat
