name: Tests

on:
  push:
    paths-ignore:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/landing-page.html"
      - "docs/manager-recipes.md"
      - "docs/package-release.md"
      - "scripts/check-landing-page.mjs"
      - "scripts/serve-landing-page.mjs"
      - "scripts/capture-static-html-screenshot.mjs"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  unittest:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Python version
        run: python3 --version

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run release-candidate deterministic checks
        run: scripts/rc-check --skip-live-smoke-repeat

      - name: Run setup bundle dogfood QA
        run: bin/conveyor qa-run setup-bundle-dogfood --receipt-output "$RUNNER_TEMP/setup-bundle-dogfood-receipt.json" --json

      - name: Upload setup bundle dogfood receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: setup-bundle-dogfood-receipt
          path: ${{ runner.temp }}/setup-bundle-dogfood-receipt.json
          if-no-files-found: error

      - name: Run package install smoke
        run: scripts/package-smoke
